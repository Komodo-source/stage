<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livret Idylliq</title>
  <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=League+Spartan:wght@400;500;600;700&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="https://idylliq.fr/favicon.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1F6D67; --green-dark: #155450; --green-mid: #2a8a83;
      --green-light: #e8f4f3; --green-pale: #f2f8f7;
      --warm: #fbf9f6; --warm-mid: #ede8e0; --warm-dark: #c8bfb0;
      --ink: #2c2824; --ink-mid: #5a534a; --ink-light: #9a9088;
      --white: #ffffff; --accent: #d4956a; --accent-pale: #fdf5ef;
      --shadow-soft: 0 10px 30px rgba(31,109,103,0.06);
      --shadow-hover: 0 15px 40px rgba(31,109,103,0.12);
      --radius: 20px; --radius-sm: 12px;
      --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    body {
      background: var(--warm);
      font-family: 'Open Sans', sans-serif;
      color: var(--ink);
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: 'League Spartan', sans-serif;
      color: var(--green); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase;
    }
    #livret-container { max-width: 1000px; margin: 0 auto; background: var(--white); box-shadow: 0 0 50px rgba(0,0,0,0.03); }

    /* ── ANIMATIONS ── */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── COVER PAGE ── */
    .cover-page { position: relative; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .cover-hero { position: absolute; inset: 0; z-index: 1; }
    .cover-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6) saturate(1.1); }
    .cover-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(21,84,80,0.4) 0%, transparent 40%, rgba(21,84,80,0.85) 100%); }
    .cover-brand { position: absolute; top: 3rem; left: 3.5rem; z-index: 2; display: flex; align-items: center; gap: 1rem; }
    .cover-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .cover-brand-name { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; color: var(--white); }
    .cover-content { position: absolute; bottom: 8rem; left: 3.5rem; right: 3.5rem; z-index: 2; }
    .cover-label { font-family: 'League Spartan', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .cover-title { font-family: 'Julius Sans One', sans-serif; font-size: clamp(2.5rem, 7vw, 5.5rem); color: var(--white); line-height: 1.05; margin-bottom: 0.5rem; text-transform: uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.2); word-wrap: break-word; hyphens: auto; }
    .cover-subtitle { font-size: clamp(1.2rem, 3vw, 1.6rem); font-style: italic; font-weight: 300; color: rgba(255,255,255,0.9); margin-bottom: 2.5rem; }
    .cover-chapters { display: flex; gap: 2.5rem; flex-wrap: wrap; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 2rem; }
    .cover-chapter { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; cursor: pointer; transition: var(--transition); }
    .cover-chapter:hover { transform: translateY(-3px); }
    .cover-chapter-num { font-family: 'League Spartan', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
    .cover-chapter-name { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--white); transition: color 0.3s ease; }
    .cover-chapter:hover .cover-chapter-name { color: var(--accent); }
    .cover-strip { position: absolute; bottom: 0; width: 100%; z-index: 3; background: rgba(21,84,80,0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 1.25rem 3.5rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); }
    .cover-strip-text { font-family: 'League Spartan', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.7); }
    .cover-strip-id { font-family: 'Julius Sans One', sans-serif; font-size: 1.3rem; color: var(--white); letter-spacing: 2px; }

    /* ── SEARCH ── */
    #search-container { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.11); border: 1px solid rgba(31,109,103,0.1); overflow: hidden; width: 90%; max-width: 400px; transition: var(--transition); }
    #search-container:focus-within { box-shadow: 0 8px 30px rgba(31,109,103,0.2); transform: translateX(-50%) translateY(-2px); border-color: var(--green-mid); }
    #search { flex: 1; border: none; outline: none; padding: 0.8rem 1.5rem; font-family: 'Open Sans', sans-serif; font-size: 0.95rem; background: transparent; color: var(--ink); }
    #search::placeholder { color: var(--ink-light); }
    #search-button { padding: 0.8rem 1.5rem; background: transparent; border: none; color: var(--green); cursor: pointer; font-size: 1.2rem; transition: var(--transition); }
    #search-button:hover { color: var(--accent); transform: scale(1.1); }

    /* ── SECTIONS ── */
    .theme-page { padding: 5rem 4.5rem; border-bottom: 1px solid var(--warm-mid); }
    .theme-header { margin-bottom: 3.5rem; text-align: center; }
    .theme-label { font-family: 'League Spartan', sans-serif; color: var(--accent); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 0.75rem; }
    .theme-title { font-family: 'Julius Sans One', sans-serif; color: var(--green-dark); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
    .theme-header::after { content: ''; display: block; width: 40px; height: 2px; background: var(--green); margin: 1.5rem auto 0; }

    /* ── CARDS ── */
    .card { margin-bottom: 3.5rem; border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow-soft); transition: var(--transition); border: 1px solid rgba(237,232,224,0.5); overflow: hidden; }
    .card-body { padding: 2.5rem; }
    .card-item-title { font-family: 'Julius Sans One', sans-serif; color: var(--green-dark); font-size: 1.6rem; text-transform: uppercase; margin-bottom: 1rem; font-weight: 600; }

    /* Image+Text side-by-side */
    .tpl-image-text { display: grid; grid-template-columns: 1fr 1.2fr; align-items: stretch; }
    .tpl-image-text .gallery-wrapper { overflow: hidden; position: relative; min-height: 300px; }
    .tpl-image-text .gallery-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; transition: transform 0.6s ease; }
    .tpl-image-text .gallery-wrapper:hover img { transform: scale(1.05); }

    /* FIX: image sizing - controlled max-height, no overflow */
    .img-single { overflow: hidden; position: relative; border-radius: var(--radius) var(--radius) 0 0; }
    .img-single img { width: 100%; height: 300px; object-fit: cover; display: block; cursor: pointer; transition: transform 0.6s ease; }
    .img-single:hover img { transform: scale(1.05); }

    /* FIX: gallery images - fixed aspect ratio, consistent size */
    .img-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; padding: 1.5rem 2.5rem; }
    .img-gallery img { width: 100%; height: 90px; object-fit: cover; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); border: 2px solid transparent; display: block; }
    .img-gallery img:hover { transform: scale(1.03); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

    /* ── MEDIA INSIDE CARD DESC ── */
    /* FIX: inline images inside parsed text — constrained width */
    .card-desc img.inline-img { max-height: 320px; width: 100%; object-fit: cover; border-radius: var(--radius-sm); cursor: pointer; display: block; margin: 1rem 0; }
    .card-desc iframe { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-sm); border: none; display: block; margin: 1rem 0; }
    .card-desc video { width: 100%; max-height: 360px; border-radius: var(--radius-sm); display: block; margin: 1rem 0; }

    /* ── ATTENTION BOX ── */
    .attention-box { margin-top: 2.5rem; padding: 2rem; background: var(--accent-pale); border: 1px solid rgba(212,149,106,0.3); border-radius: var(--radius); position: relative; overflow: hidden; display: flex; gap: 1.5rem; align-items: flex-start; }
    .attention-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: var(--accent); }
    .attention-icon { font-size: 2rem; flex-shrink: 0; line-height: 1; }
    .attention-content { flex: 1; min-width: 0; }
    .attention-label { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }

    /* ── TYPOGRAPHY ── */
    .card-desc { font-family: 'Open Sans', sans-serif; font-size: 1rem; line-height: 1.7; color: var(--ink-mid); font-weight: 300; }
    .card-desc p { margin-bottom: 1rem; }
    .card-desc strong { font-weight: 600; color: var(--ink); }
    .card-desc a { color: var(--green-mid); text-decoration: none; border-bottom: 1px solid transparent; transition: var(--transition); font-weight: 500; }
    .card-desc a:hover { border-bottom-color: var(--green-mid); }
    .kv-line { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--warm-mid); }
    .kv-line:last-child { border-bottom: none; }
    .kv-key { font-weight: 600; color: var(--green-dark); font-family: 'League Spartan', sans-serif; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem; }
    .kv-val { color: var(--ink-mid); text-align: right; }
    .bullet-line { position: relative; padding-left: 2rem; margin-bottom: 0.75rem; }
    .bullet-line::before { content: ''; position: absolute; left: 0; top: 0.6rem; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .category-badge { display: inline-block; background: var(--green-pale); color: var(--green-dark); font-family: 'League Spartan', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 30px; margin-bottom: 1.5rem; border: 1px solid var(--green-light); }

    /* ── GRIDS ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; }
    .cico-card { border-radius: var(--radius); padding: 2.5rem; background: var(--white); box-shadow: var(--shadow-soft); text-align: center; border: 1px solid var(--warm-mid); transition: var(--transition); }
    .cico-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--accent); }
    .cico-label { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 4px; color: var(--accent); margin-bottom: 1rem; }
    .cico-time { font-family: 'Julius Sans One', sans-serif; font-size: 2.5rem; color: var(--green-dark); }
    .disposition-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; margin-top: 2.5rem; }
    .disposition-item { background: var(--white); border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center; border: 1px solid var(--warm-mid); box-shadow: var(--shadow-soft); transition: var(--transition); }
    .disposition-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--green-mid); }
    .disposition-item img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 1rem; filter: drop-shadow(0 4px 6px rgba(31,109,103,0.1)); }
    .d-etage { font-family: 'League Spartan', sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 0.5rem; }
    .d-piece { font-family: 'Julius Sans One', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--green-dark); }
    .reco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2.5rem; }
    .reco-card { border-radius: var(--radius); overflow: hidden; background: var(--white); box-shadow: var(--shadow-soft); transition: var(--transition); border: 1px solid var(--warm-mid); display: flex; flex-direction: column; }
    .reco-body { padding: 2rem; flex: 1; display: flex; flex-direction: column; }
    .reco-name { font-family: 'Julius Sans One', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--green-dark); text-transform: uppercase; margin-bottom: 0.5rem; }
    .reco-score { font-family: 'League Spartan', sans-serif; font-size: 0.75rem; color: var(--white); background: var(--accent); padding: 0.2rem 0.8rem; border-radius: 20px; display: inline-block; margin-bottom: 1rem; align-self: flex-start; }
    .reco-desc { flex: 1; }
    .reco-link { margin-top: 1.5rem; display: inline-block; font-family: 'League Spartan', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--green); text-decoration: none; padding: 1rem; border-top: 1px solid var(--warm-mid); width: 100%; text-align: center; transition: var(--transition); }
    .reco-link:hover { color: var(--accent); }

    /* ── WIFI BUTTON ── */
    #copymdp { padding: 1rem 2rem; border-radius: 30px; transition: var(--transition); cursor: pointer; border: none; font-weight: 600; font-family: 'League Spartan', sans-serif; text-transform: uppercase; letter-spacing: 2px; background-color: var(--green); color: #fff; display: inline-block; margin-top: 1rem; }
    #copymdp:hover { background-color: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,149,106,0.3); }

    /* ── FOOTER ── */
    .presentation-end { padding: 5rem 4.5rem; background: var(--warm-mid); text-align: center; }
    .presentation-end h1 { font-family: 'Julius Sans One', sans-serif; color: var(--green-dark); font-size: 2.5rem; margin-bottom: 2rem; text-transform: uppercase; }
    .presentation-end p { max-width: 700px; margin: 0 auto 1.5rem; font-size: 1.05rem; }
    .end-page { padding: 6rem 4rem; text-align: center; background: var(--green-dark); color: white; }
    .end-page h1 { font-family: 'Julius Sans One', sans-serif; font-size: 3rem; margin-bottom: 1rem; color: var(--accent-pale); }
    .end-page p { font-family: 'League Spartan', sans-serif; letter-spacing: 5px; font-size: 1rem; text-transform: uppercase; color: var(--accent); }

    /* ── LIGHTBOX ── */
    .lightbox { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(21,40,38,0.95); backdrop-filter: blur(10px); justify-content: center; align-items: center; padding: 2rem; }
    .lightbox.active { display: flex; }
    .lightbox-content { position: relative; max-width: 90vw; max-height: 90vh; }
    .lightbox-content img { max-width: 100%; max-height: 85vh; border-radius: var(--radius-sm); box-shadow: 0 20px 60px rgba(0,0,0,0.5); object-fit: contain; }
    .lightbox-close { position: absolute; top: -40px; right: -40px; color: white; font-size: 2.5rem; cursor: pointer; transition: var(--transition); line-height: 1; }
    .lightbox-close:hover { color: var(--accent); transform: rotate(90deg); }
    .lightbox-counter { text-align: center; color: white; margin-top: 1rem; font-family: 'League Spartan', sans-serif; letter-spacing: 2px; font-size: 0.85rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .theme-page, .presentation-end { padding: 3rem 1.5rem; }
      .cover-content, .cover-brand { left: 1.5rem; right: 1.5rem; }
      .cover-strip { left: 0; right: 0; flex-direction: column; gap: 1rem; text-align: center; padding: 1.5rem; }
      .cover-title { font-size: 2.2rem; }
      .tpl-image-text { grid-template-columns: 1fr; }
      .tpl-image-text .gallery-wrapper { min-height: 220px; }
      .grid-2 { grid-template-columns: 1fr; }
      .card-body { padding: 1.5rem; }
      .attention-box { flex-direction: column; gap: 1rem; padding: 1.5rem; }
      .lightbox-close { right: 0; top: -50px; }
      .img-gallery { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
      .img-gallery img { height: 70px; }
    }
    @media (max-width: 480px) {
      #search-container { top: 1rem; width: calc(100% - 2rem); }
      #search { font-size: 0.9rem; padding: 0.7rem 1rem; }
    }

    /* ── DESCRIPTION LIST & SECTION LABELS ── */
    .desc-list { list-style: none; padding: 0; margin: 0.5rem 0 1rem 0; }
    .desc-list li { position: relative; padding: 0.4rem 0 0.4rem 1.75rem; line-height: 1.6; color: var(--ink-mid); font-size: 1rem; font-weight: 300; border-bottom: 1px solid var(--warm-mid); }
    .desc-list li:last-child { border-bottom: none; }
    .desc-list li::before { content: ''; position: absolute; left: 0; top: 0.8rem; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .section-label { font-family: 'League Spartan', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--green-dark); margin: 1.5rem 0 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--warm-mid); }
    .section-label:first-child { margin-top: 0; }

    /* ── TYPOGRAPHY ── */
/* Increased font-size slightly and increased line-height for readability */
.card-desc { font-family: 'Open Sans', sans-serif; font-size: 1.05rem; line-height: 1.85; color: var(--ink-mid); font-weight: 300; }

/* Doubled the space between paragraphs */
.card-desc p { margin-bottom: 1.5rem; }
.card-desc strong { font-weight: 600; color: var(--ink); }
.card-desc a { color: var(--green-mid); text-decoration: none; border-bottom: 1px solid transparent; transition: var(--transition); font-weight: 500; }
.card-desc a:hover { border-bottom-color: var(--green-mid); }

/* Increased space between key-value pairs */
.kv-line { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--warm-mid); }
.kv-line:last-child { border-bottom: none; }
.kv-key { font-weight: 600; color: var(--green-dark); font-family: 'League Spartan', sans-serif; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem; }
.kv-val { color: var(--ink-mid); text-align: right; }
.category-badge { display: inline-block; background: var(--green-pale); color: var(--green-dark); font-family: 'League Spartan', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 30px; margin-bottom: 1.5rem; border: 1px solid var(--green-light); }

/* ── DESCRIPTION LIST & SECTION LABELS ── */
.desc-list { list-style: none; padding: 0; margin: 0.5rem 0 1.5rem 0; }

/* Increased padding inside list items so text doesn't feel cramped */
.desc-list li { position: relative; padding: 0.6rem 0 0.6rem 2rem; line-height: 1.7; color: var(--ink-mid); font-size: 1.05rem; font-weight: 300; border-bottom: 1px solid var(--warm-mid); }
.desc-list li:last-child { border-bottom: none; }

/* Adjusted the bullet point to align perfectly with the new spacing */
.desc-list li::before { content: ''; position: absolute; left: 0; top: 1.1rem; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.section-label { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--green-dark); margin: 2rem 0 0.5rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--warm-mid); }
.section-label:first-child { margin-top: 0; }
  </style>
</head>

  document.getElementById('lightbox').classList.add('active');

───────────────────────────────────────────────────────────── */
async function fetchAll(table) {
  let records = [], offset = null;
  do {
    const url = new URL(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}`);
    if (offset) url.searchParams.set('offset', offset);
    const res  = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    records = records.concat(data.records);
    offset  = data.offset || null;
  } while (offset);
  return records;
}

function detectVideoType(url) {
  if (!url || typeof url !== 'string') return null;
  const u = url.toLowerCase();
  if (
    u.includes('youtube.com/watch') ||
    u.includes('youtu.be/') ||
    u.includes('youtube.com/embed/')
  ) return 'youtube';
  if (u.includes('vimeo.com')) return 'vimeo';
  if (/\.(mp4|webm|ogg|mov)([?#]|$)/i.test(url)) return 'native';
  return 'iframe';
}

function extractYouTubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function detectVideoType(url) {
  if (!url || typeof url !== 'string') return null;
  const u = url.toLowerCase();

  // Broadened YouTube detection
  if (u.match(/(youtube\.com|youtu\.be)/)) return 'youtube';
  if (u.includes('vimeo.com')) return 'vimeo';

  // FIX: Catch standard extensions AND Airtable's internal video hosting
  if (/\.(mp4|webm|ogg|mov)([?#]|$)/i.test(url) || url.includes('airtableusercontent.com')) {
      return 'native';
  }
  return 'iframe';
}

function renderVideo(url) {
  const type = detectVideoType(url);

  if (type === 'youtube') {
    const id = extractYouTubeId(url);
    console.log("escapeAttr(url)", escapeAttr(url))
    console.log("url", url)
    if (!id) return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;"></iframe>`;
    return `<iframe src="https://www.youtube.com/embed/${id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;box-shadow:var(--shadow-soft);"></iframe>`;
  }

  if (type === 'vimeo') {
    const id = url.match(/vimeo\.com\/(\d+)/)?.[1];
    if (!id) return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;"></iframe>`;
    return `<iframe src="https://player.vimeo.com/video/${id}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;box-shadow:var(--shadow-soft);"></iframe>`;
  }

  if (type === 'native') {
    return `<video controls preload="metadata" style="width:100%;max-height:400px;border-radius:12px;margin:1.5rem 0;box-shadow:var(--shadow-soft);background:#000;">
              <source src="${escapeAttr(url)}">
              Votre navigateur ne supporte pas la vidéo.
            </video>`;
  }

  return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;"></iframe>`;
}
function is_file_image(str) { return /\.(jpg|jpeg|png|gif|webp|svg|tiff|psd|raw)$/i.test(str || ''); }
function escapeHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(str) { return (str || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function replacePlaceholders(text, images, videos) {
  let out = text || '';
  // Replace $i0, $i1... with images
  if (Array.isArray(images)) {
    images.forEach((url, i) => {
      const safeUrl = (url || '').replace(/'/g, "\\'");
      out = out.replace(
        new RegExp('\\$i' + i + '(?!\\d)', 'g'),
        `<img src="${url}" class="inline-img" loading="lazy" style="cursor:pointer;" onclick="openLightbox('${safeUrl}', 1, 0)" alt="">`
      );
    });
  }
  if (Array.isArray(videos)) {
    videos.forEach((url, i) => {
      out = out.replace(new RegExp('\\$v' + i + '(?!\\d)', 'g'), renderVideo(url));
    });
  }
  out = out.replace(/\$[iv]\d+/g, '');
  return out;
}

function parseDescription(text, attachments, hideInlineImages) {
  if (!text) return '';

  // Detect if already HTML
  const isHtml = /<\/?(h[1-6]|p|ul|ol|li|div|table|br)\b/i.test(text);

  let out = text;

  if (attachments && typeof attachments === 'object' && !Array.isArray(attachments)) {
    if (!hideInlineImages) {
      out = replacePlaceholders(out, attachments.images || [], attachments.videos || []);
    } else {
      out = out.replace(/\$[iv]\d+/g, '');
    }
  } else if (Array.isArray(attachments) && attachments.length > 0) {
    const images = attachments.filter(a => is_file_image(a.filename || '')).map(a => a.url);
    const videos = attachments.filter(a => !is_file_image(a.filename || '') && a.url).map(a => a.url);
    if (!hideInlineImages) {
      out = replacePlaceholders(out, images, videos);
    } else {
      out = out.replace(/\$[iv]\d+/g, '');
    }
  } else {
    // No attachments — strip any remaining placeholders
    out = out.replace(/\$[iv]\d+/g, '');
  }

  if (isHtml) {
    return out;
  }

  out = out.replace(/((?:<[^>]*>)|(?:https?:\/\/[^\s<"']+))/g, (match) => {
    if (match.startsWith('<')) return match;

    if (match.includes('airtableusercontent.com') || match.includes('brzw-') || match.includes('breezeway')) {
      if (is_file_image(match) && !hideInlineImages) {
        const safeUrl = match.replace(/'/g, "\\'");
        return `<img src="${match}" class="inline-img" loading="lazy" style="cursor:pointer;" onclick="openLightbox('${safeUrl}', 1, 0)" alt="">`;
      }
      return '';
    }
    return `<a href="${escapeAttr(match)}" target="_blank" rel="noopener noreferrer">${escapeHtml(match)}</a>`;
  });

  const lines = out.split('\n').map(l => l.trim()).filter(Boolean);

  const rendered = [];
  let inList = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (/^<(img|iframe|video|div|p|h[1-6]|a\s)/.test(line)) {
      if (inList) { rendered.push('</ul>'); inList = false; }
      rendered.push(line);
      continue;
    }

    const isSectionHeader = (
      (/^[A-ZÉÈÀÙÂÊÎÔÛÇ0-9\/\- ]{3,50}:?$/.test(line) && line === line.toUpperCase() && !line.includes('http')) ||
      (/^[A-ZÉÈÀÙÂÊÎÔÛÇ][\w\s]{2,40}:$/.test(line) && line.length < 50)
    );
    if (isSectionHeader && line.length > 2) {
      if (inList) { rendered.push('</ul>'); inList = false; }
      const label = line.replace(/:$/, '');
      rendered.push(`<p class="section-label">${escapeHtml(label)}</p>`);
      continue;
    }

    const bulletMatch = line.match(/^(?:[-•*]\s+|\d+\.\s+|NO\.?\s*\d+\s*[-:]?\s*)/i);
    if (bulletMatch) {
      const clean = line.slice(bulletMatch[0].length).trim();
      if (!inList) { rendered.push('<ul class="desc-list">'); inList = true; }
      rendered.push(`<li>${clean}</li>`);
      continue;
    }

    // Close list before non-bullet content
    if (inList) { rendered.push('</ul>'); inList = false; }

    const colonIdx = line.indexOf(': ');
    if (colonIdx > 0 && colonIdx < 55 && !line.startsWith('<')) {
      const left = line.slice(0, colonIdx);
      const right = line.slice(colonIdx + 2);
      if (!left.includes('<') && !/https?:\/\//.test(left)) {
        rendered.push(`<div class="kv-line"><span class="kv-key">${escapeHtml(left)}</span><span class="kv-val">${right}</span></div>`);
        continue;
      }
    }

    rendered.push(`<p>${line}</p>`);
  }

  if (inList) rendered.push('</ul>');
  out = rendered.join('');

  return out;
}

function renderImageGallery(photos, itemName) {
  if (!photos || !photos.length) return '';
  const safe = photos.map(p => ({
    url: typeof p === 'string' ? p : (p.url || ''),
    thumb: typeof p === 'string' ? p : (p.thumbnails?.full?.url || p.url || '')
  })).filter(p => p.url);

  if (!safe.length) return '';

  if (safe.length === 1) {
    const s = safe[0].url.replace(/'/g, "\\'");
    return `<div class="img-single"><img src="${safe[0].url}" alt="${escapeAttr(itemName || '')}" loading="lazy" onclick="openLightbox('${s}', 1, 0)"></div>`;
  }
  let html = `<div class="img-gallery">`;
  safe.forEach((p, i) => {
    const s = p.url.replace(/'/g, "\\'");
    html += `<img src="${p.thumb}" alt="${escapeAttr(itemName || '')} ${i+1}" loading="lazy" onclick="openLightbox('${s}', ${safe.length}, ${i})">`;
  });
  html += `</div>`;
  return html;
}

          <h3 class="reco-name">${escapeHtml(f.NomRecommandation || '–')}</h3>
          ${score ? `<div class="reco-score">${score} ★</div>` : ''}
          ${f.Adress ? `<div class="card-desc" style="font-size:0.85rem;margin-bottom:1rem;opacity:0.8;">📍 ${escapeHtml(f.Adress)}</div>` : ''}
          <div class="card-desc reco-desc">${escapeHtml(f.Description || '')}</div>
        </div>
        ${mapsLink}
      </article>`;
  }).join('');

  return `
    <section id="section-reco" class="theme-page reveal">
      <div class="theme-header">
        <div class="theme-label">Coups de cœur</div>
        <div class="theme-title">Nos Adresses</div>
      </div>
      <div class="reco-grid">${cards}</div>
    </section>`;
}

/* ─────────────────────────────────────────────────────────────
   MAIN BUILD
───────────────────────────────────────────────────────────── */
async function buildLivret(IdMaison) {
  const [ maisonRecs, livretRecs, equipRecs, piscineRecs, dispRecs, wfRecs, recoRecs, listRecs ] =
    await Promise.all([
      fetchAll(TABLE_MAISON), fetchAll(TABLE_LIVRET), fetchAll(TABLE_EQUIPEMENT),
      fetchAll(TABLE_PISCINE), fetchAll(TABLE_DISPOSITION), fetchAll(TABLE_WORKFLOW),
      fetchAll(TABLE_RECOMMANDATION), fetchAll(TABLE_LISTE_MAISON)
    ]);

  const maisonRecord = maisonRecs.find(r => r.fields.IdMaison === IdMaison && r.fields.Livret);
  if (!maisonRecord) {
    document.getElementById('loading').innerText = `Maison introuvable pour l'identifiant "${IdMaison}".`;
    return;
  }

  const listData = listRecs.find(r => r.fields.IdMaison === IdMaison);
  const nomMaison = listData?.fields?.NomMaison || IdMaison;
  // FIX: safely get cover image from Airtable attachment array
  const coverImg = listData?.fields?.ImageMaison?.[0]?.url || '';

  // Build theme map from equipment
  const livretIds = maisonRecord.fields['Livret 2'] || [];
  const equipIds = new Set();
  livretRecs
    .filter(r => livretIds.includes(r.id))
    .forEach(lr => (lr.fields.equipement || []).forEach(id => equipIds.add(id)));

  const themeMap = {};
  equipRecs.filter(r => equipIds.has(r.id)).forEach(rec => {
    const catArr = rec.fields['Catégorie'];
    const cat = Array.isArray(catArr) ? catArr[0] : (catArr || 'Général');
    if (!themeMap[cat]) themeMap[cat] = [];

    const allPhotos = (rec.fields.Photos || []);
    const photoUrls = allPhotos
      .filter(p => is_file_image(p.filename || ''))
      .map(p => p.url);

    const videos = [];
    if (rec.fields.lienYoutube) videos.push(rec.fields.lienYoutube);

    themeMap[cat].push({
      Item:         rec.fields.NomEquipement || '–',
      Description:  rec.fields.descriptionLivret || '',
      Categorie:    cat,
      _photos:      photoUrls,
      _attachments: allPhotos,
      _videos:      videos
    });
  });

  Object.values(themeMap).forEach(items => {
    items.forEach(item => {
      if (item._videos.length > 0 && item.Description) {
        // Append video if not already referenced
        item.Description = item.Description + '\n' + item._videos.map(v => renderVideo(v)).join('\n');
      }
    });
  });

  const html =
    `<div id="search-container">
       <input type="search" id="search" placeholder="Rechercher..." oninput="doSearch(this.value)">
       <button id="search-button">🔍</button>
     </div>` +
    renderCover(nomMaison, IdMaison, coverImg) +
    get_global_info_maison(maisonRecord) +
    getCICO(wfRecs, maisonRecord.id) +
    Object.keys(themeMap).map((th, idx) => renderThemePage(th, themeMap[th], idx)).join('') +
    (maisonRecord.fields['Piscine']
      ? renderPiscinePage(piscineRecs.find(p => (maisonRecord.fields['Piscine'] || []).includes(p.id)))
      : '') +
    getDispositionMaison(dispRecs, maisonRecord.id) +
    getRecommandation(recoRecs, maisonRecord.id) +
    `<section class="presentation-end reveal">
       <h1>La Collection Idylliq</h1>
       <p>Cette propriété fait partie de la première collection de maisons haut de gamme pensée pour les familles.</p>
     </section>
     <footer class="end-page">
       <h1>Excellent Séjour</h1>
       <p onclick="window.open('https://idylliq.fr/')" style="cursor:pointer">idylliq.fr</p>
     </footer>`;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('livret-container').innerHTML = html;

  // Scroll reveal
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

/* ─────────────────────────────────────────────────────────────
   SEARCH
   FIX: was calling initSearch() which was never defined
───────────────────────────────────────────────────────────── */
function doSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('.card, .reco-card, .disposition-item').forEach(el => el.style.display = '');
    return;
  }
  document.querySelectorAll('.card, .reco-card, .disposition-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = text.includes(q) ? '' : 'none';
  });
}

/* ─────────────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────────────── */
const urlParams = new URLSearchParams(window.location.search);
const idMaison  = urlParams.get('maison');
if (!idMaison) {
  document.getElementById('loading').innerText = "Veuillez indiquer l'identifiant de la maison (?maison=M7)";
} else {
  buildLivret(idMaison).catch(err => {
    console.error(err);
    document.getElementById('loading').innerText = 'Erreur : ' + err.message;
  });
}
</script>
