async function fetchAll(table) {
  let records = [], offset = null;
  do {
    const url = new URL(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}`);
    if (offset) url.searchParams.set('offset', offset);
    const res  = await fetch(url, {
      headers: { Authorization: `Bearer ${TOKEN}` }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
    records = records.concat(data.records);
    offset  = data.offset || null;
  } while (offset);
  return records;
}

function isImageUrl(url) {
  return  url.includes('airtableusercontent.com');
}

function parseDescription(text) {
  if (!text) return '';

  return text.replace(/\[?(https?:\/\/[^\]\s<]+)\]?/g, (match, url) => {
    if (isImageUrl(url)) {
      console.log(url);
      return `<img src="${url}" alt="">`;
    }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; font-weight: 600;">${url}</a>`;
  });
}

function hasInstructions(desc) {
  if (desc?.includes(' : ') || desc.trim().includes(':')){
    return true;
  }return false;
}

function renderChecklist(desc) {
  return desc.split('\n').filter(Boolean).map(line => {
    const sep = line.indexOf(' : ');
    const sep3 = line.indexOf(': ');
    const sep4 = line.indexOf(' :');
    if (sep !== -1) {
      return `<li class="no-checkbox"><span class="bold-title">${line.slice(0, sep)}</span> : ${line.slice(sep + 3)}</li>`;
    }else if(sep3 !== -1){
      return `<li class="no-checkbox"><span class="bold-title">${line.slice(0, sep3)}</span> : ${line.slice(sep3 + 3)}</li>`;
    }else if(sep4 !== -1){
      return `<li class="no-checkbox"><span class="bold-title">${line.slice(0, sep4)}</span> : ${line.slice(sep4 + 3)}</li>`;
    }
    return `<li>${line}</li>`;
  }).join('');
}

function selectTemplate(items) {
  const withPhoto = items.filter(i => i._photos.length > 0);
  const withDesc  = items.filter(i => i.Description && i.Description.trim());
  const withInstr = items.filter(i => hasInstructions(i.Description));

  if (withInstr.length > 0) return 'instructions';
  if (items.length >= 3 && withPhoto.length >= 2) return 'image-two-text';
  if (items.length === 2 && withPhoto.length === 2) return 'two-images';
  if (withPhoto.length > 0 && withDesc.length > 0) return 'image-text';
  if (withPhoto.length > 0 && withDesc.length === 0) return 'image-full';
  return 'text-only';
}

function renderCard(items) {
  const tpl = selectTemplate(items);

  if (tpl === 'image-text') {
    return items.map(item => {
      const img  = item._photos[0] ? `<div class="card-img"><img src="${item._photos[0]}" alt="${item.Item}"></div>` : '';
      const desc = item.Description ? `<div class="card-desc">${parseDescription(item.Description)}</div>` : '';
      return `
      <div class="card card-box tpl-image-text">
        ${img}
        <div class="card-body">
          <div class="card-item-title">${item.Item}</div>
          ${desc}
        </div>
      </div>`;
    }).join('');
  }

  if (tpl === 'image-full') {
    return items.map(item => {
      const img = item._photos[0] ? `<img src="${item._photos[0]}" alt="${item.Item}">` : '';
      return `
      <div class="card card-box tpl-image-full">
        ${img}
        <div class="card-body">
          <div class="card-item-title">${item.Item}</div>
        </div>
      </div>`;
    }).join('');
  }

  if (tpl === 'two-images') {
    const imgs = items.map(i =>
      `<div>
        <img src="${i._photos[0]}" alt="${i.Item}">
        <div class="card-item-title" style="margin-top:0.75rem;">${i.Item}</div>
        ${i.Description ? `<div class="card-desc">${parseDescription(i.Description)}</div>` : ''}
      </div>`
    ).join('');
    return `<div class="card tpl-two-images">${imgs}</div>`;
  }

  if (tpl === 'image-two-text') {
    const first = items[0];
    const rest  = items.slice(1);
    const imgHtml = first._photos[0]
      ? `<img src="${first._photos[0]}" alt="${first.Item}">`
      : `<div class="card-item-title">${first.Item}</div>`;
    const textCols = rest.map(i => `
      <div>
        <div class="card-item-title">${i.Item}</div>
        ${i.Description ? `<div class="card-desc">${parseDescription(i.Description)}</div>` : ''}
      </div>`).join('');
    return `
    <div class="card card-box tpl-image-two-text">
      <div>${imgHtml}</div>
      ${textCols}
    </div>`;
  }

  if (tpl === 'instructions') {
    return items.map(item => {
      const img = item._photos[0] ? `<img src="${item._photos[0]}" alt="${item.Item}" style="width:100%;border-radius:10px;margin-bottom:1rem;">` : '';
      const list = hasInstructions(item.Description)
        ? `<ul class="checklist">${renderChecklist(item.Description)}</ul>`
        : `<div class="card-desc">${parseDescription(item.Description)}</div>`;
      return `
      <div class="card card-box tpl-instructions">
        <div class="card-item-title">${item.Item}</div>
        ${img}
        ${list}
      </div>`;
    }).join('');
  }

  // text-only (default)
  return items.map(item => {
    const desc = item.Description ? `<div class="card-desc">${parseDescription(item.Description)}</div>` : '';
    return `
    <div class="card card-box tpl-text-only">
      <div class="card-item-title">${item.Item}</div>
      ${desc}
    </div>`;
  }).join('');
}

  const themeMap = {};
  //const nomMaison = maisonItems[0]?.fields?.NomVillage || IdMaison;
  const nomMaison = await fetchNomMaison(IdMaison);
  console.log(nomMaison)
  console.log(await fetchNomMaison(IdMaison))
  let coverPhoto  = null;
  let maisonNumero = '';

  maisonItems.forEach(record => {
    const f      = record.fields;
    const themes = f.Theme || ['Général'];
    const l2ids  = f['Livret 2'] || [];
    const mainPhoto = f.Photo?.[0]?.url || null;
    if (!coverPhoto) coverPhoto = mainPhoto;

    if (l2ids.length > 0) {
      l2ids.forEach(lid => {
        const lf = livretById[lid];
        if (!lf) return;
        let desc = lf.Description || '';
        let itemPhotos = [];

        desc = desc.replace(/\[?(https?:\/\/[^\]\s<]+)\]?/g, (match, url) => {
          if (isImageUrl(url)) {
            itemPhotos.push(url);
            return '';
          }
          return `<a href="${match}" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; font-weight: 600;">${match}</a>`;
        }).trim();

        themes.forEach(theme => {
          if (!themeMap[theme]) themeMap[theme] = [];
          themeMap[theme].push({
            Item: lf.Item || '',
            Description: desc,
            _photos: itemPhotos
          });
        });

      });
    } else {
      const itemsTexte = (f.Texte || '').split(';').filter(Boolean);
      themes.forEach(theme => {
        if (!themeMap[theme]) themeMap[theme] = [];
        itemsTexte.forEach(item => {
          themeMap[theme].push({ Item: item.trim(), Description: '', _photos: mainPhoto ? [mainPhoto] : [] });
        });
      });
    }
  });

  Object.keys(themeMap).forEach(t => {
    const seen = new Set();
    themeMap[t] = themeMap[t].filter(i => { if (seen.has(i.Item)) return false; seen.add(i.Item); return true; });
  });

  const themes     = Object.keys(themeMap);
  const totalPages = themes.length;

  const cover = renderCover(nomMaison, IdMaison, coverPhoto);

  const pages = themes.map((th, i) => renderThemePage(th, themeMap[th], i + 1, totalPages)).join('\n');
  const presentation = renderCollection();
  const end   = `<div class="end-page"><h1>TRÈS BEAU SÉJOUR</h1><p>WWW.IDYLLIQ.FR</p></div>`;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('livret-container').innerHTML = generateSeachInput() + cover + pages + presentation + end;
}


buildLivret('M64').catch(err => {
  document.getElementById('loading').innerText = 'Erreur : ' + err.message;
  console.error(err);
});


function seachInPage() {
  const input = document.getElementById("search");
  const value = input.value;

  if (value) {
    window.find(value);
    input.focus()
  }
}
