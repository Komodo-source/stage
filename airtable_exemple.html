const blockTemplates = {

    },

      function generateHref(description){
        description = description.replace(
          /(https?:\/\/[^\s]+)/g,
          '<a href="$1" target="_blank">$1</a>'
        );
        return description;
      }

      function searchInPage() {
            const value = document.getElementById("search").value;
            const elements = document.querySelectorAll("body *");

            for (let el of elements) {
              let v = (el.textContent).toLowerCase();
              if (el.children.length === 0 && v.includes(value.toLowerCase())) {
                el.scrollIntoView({ behavior: "smooth", block: "center" });
                break;
              }
            }
      }



      function selectTemplate(fields) {
        fields.Description = generateHref(fields.Description);
        //ralentit un peu la création

        const hasImage = Array.isArray(fields.Image) && fields.Image.length > 0;
        const hasInstruction =
          fields.Instruction && String(fields.Instruction).trim() !== '';
        const hasDescription =
          fields.Description && String(fields.Description).trim() !== '';
        const isTitle =
          fields.Appareil &&
          String(fields.Appareil).toLowerCase().includes('titre');

        if (isTitle) return 'titre';
        //if (hasInstruction) return 'instructions';
        if (hasImage && hasDescription) return 'image_text_lateral';
        if (hasImage && !hasDescription) return 'image_seule';
        return 'paragraphe';
      }

      function renderBlock(fields) {
        const templateName = selectTemplate(fields);
        const templateFn = blockTemplates[templateName];
        if (!templateFn) {
          console.warn(`[livret-engine] Template inconnu : ${templateName}`);
          return '';
        }
        return templateFn(fields);
      }

      function renderPage(pageBlocks, pageNum, nomVillage = '') {
        const blocksHtml = pageBlocks
          .map((fields) => renderBlock(fields))
          .join('\n');

        const footer = `
  <div class="footer">
    <span>PAGE ${pageNum} | ${nomVillage.toUpperCase()}</span>
    <span>IDYLLIQ.FR</span>
  </div>`;

        return `
<div class="page" id="page-${pageNum}">
  ${blocksHtml}
  ${footer}
</div>`;
      }






      function makeLivret(IdMaisonCherchee, allRecords) {
        const recordsMaison = allRecords
          .map((r) => r.fields)
          .filter((f) => f.IdMaison === IdMaisonCherchee);

        if (recordsMaison.length === 0) {
          console.warn(
            `[livret-engine] Aucune donnée pour IdMaison="${IdMaisonCherchee}"`,
          );
          return '';
        }


        // regrouper par page
        const pageMap = {};
        recordsMaison.forEach((fields) => {
          const pageNum = parseInt(fields.PageLivret, 10);
          if (!pageMap[pageNum]) pageMap[pageNum] = [];
          pageMap[pageNum].push(fields);
        });

        const pageNums = Object.keys(pageMap)
          .map(Number)
          .sort((a, b) => a - b);
        const nomVillage = recordsMaison[0]?.NomVillage || IdMaisonCherchee;

        const pagesHtml = pageNums
          .map((num) => renderPage(pageMap[num], num, nomVillage))
          .join('\n');

        return `<!DOCTYPE html>

    :root {

    body {

      color: var(--primary);
      text-transform: uppercase;

    }

    p, li, span, div {
      font-family: 'Open Sans', sans-serif;
      line-height: 1.6rem;
      font-size: 1.1rem;
    }

    img {
      width: 30rem;
      border-radius: 15px;
      object-fit: cover;
    }

    .section { margin-top: 2rem; margin-bottom: 2rem; }

    /* Utilitaires pour les grilles et flexbox */
    .flex-row { display: flex; gap: 2rem; align-items: flex-start; }
    .grid-2-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

    /* Styles spécifiques aux composants */
    .checklist { list-style: none; padding-left: 0; }
    .checklist li { position: relative; padding-left: 2rem; margin-bottom: 1rem; }
    .checklist li::before {
      content: '☑'; /* Symbole de case cochée */
      color: var(--primary);
      position: absolute;
      left: 0;
      font-size: 1.5rem;
      line-height: 1.5rem;
    }

    .text-danger { color: var(--danger); font-weight: bold; text-transform: uppercase; }
    .bold-title { font-weight: 600; font-family: 'League Spartan', sans-serif; font-size: 1.2rem;}

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 4rem;
      padding-top: 1rem;
      border-top: 1px solid #ccc;
      font-family: 'League Spartan', sans-serif;
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Styles adaptés pour les téléphones */
    @media (max-width: 768px) {
      body { margin: 0 1.5rem; }
      h1 { font-size: 2.5rem; }
      h2 { font-size: 1.8rem; }
      p, li { font-size: 1rem; }
      .flex-row, .grid-2-cols { flex-direction: column; grid-template-columns: 1fr; }
    }
    #search {
      position: fixed;
      width: 40%;
      opacity: 80%;
      padding: 0.4rem;
      border-radius: 7px;
      border: 2px solid #111;
      }
  </style>

      function addTemplate(name, renderFn) {
        if (typeof renderFn !== 'function')
          throw new Error('renderFn must be a function');
        blockTemplates[name] = renderFn;
      }

      if (typeof window !== 'undefined') {
        window.LivretEngine = {
          makeLivret,
          renderPage,
          renderBlock,
          selectTemplate,
          addTemplate,
        };
      }

      async function loadData() {
        try {
          const response = await fetch(
            `https://api.airtable.com/v0/${BASE_ID}/${TABLE_MAISON}`,
            { headers: { Authorization: `Bearer ${TOKEN}` } },
          );
          if (!response.ok) {
            const err = await response.json();
            console.error('Erreur Airtable :', err);
            document.getElementById('result').innerText =
              `Erreur ${response.status} : ${err.error?.message || JSON.stringify(err)}`;
            return;
          }
          const data = await response.json();
          data_formatted = data.records;
          console.log("Données récup d'Airtable: ", data);
        } catch (err) {
          console.error('Erreur :', err);
        }
      }

      async function loadDataLivret() {
