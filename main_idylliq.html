<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    @import url('httpM55s://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #1f6d67;
      --darker: #13433f;
      --primary-light: #e6f2f1;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    h1 {
      margin: 5rem 0 2rem 0;
    }
    button {
      width: 15rem;
      height: 2.2rem;
      border-radius: 7px;
      background-color: var(--primary);
      color: #fff;
      border: transparent;
      margin: 0 1rem ;
      transition: 0.7s;
      margin-top: 1rem;
      cursor: pointer;
    }
    button:hover{
      transform: translateY(5px);
      background-color: var(--darker);
    }
    body {
      text-align: center;
    }
    .buttons{
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .Instruction{
          border: 1px solid var(--border);
    padding: 1rem;
    margin: 5rem 5rem 0 5rem;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
  </style>
  <body>

    <h1>Interface <a style="color: var(--primary);">Idylliq</a></h1>
    <div class="buttons">
      <button id="creer"
        onclick="
          window.location.href =
            'https://komodo-source.github.io/stage/instruction_creation.html'
        "
      >
        Créer une maison
      </button>
      <button id="recherche"
        onclick="
          window.location.href =
            'https://komodo-source.github.io/stage/Recherche.html'
        "
      >
        Recherche/Modification
      </button>
      <button id="visu"
        onclick="
          window.location.href =
            'https://airtable.com/appLWhCKR6pEGE02s/pagu6TVMLNL7DwZQW'
        "
      >
        Visualisation par table
      </button>
      <button id="index"
        onclick="
          window.location.href =
            'https://komodo-source.github.io/stage/index_houses.html'
        "
      >
        Index des maisons
      </button>

    </div>



    <div class="Instruction">
      <p id="valeur-tabs"></p>
    </div>
        <script>
      const desc = {
        "creer": "Liste complète des instructions afin de créer une nouvelle maison dans Airtable, avec liens des formulaires",
        "recherche": "Permet de rechercher et de modifier dans la base de données entière d'Airtable",
        "visu": "Permet de visualiser les valeurs par table",
        "index": "Lien des livrets"
      }

    document.getElementById("creer").addEventListener("mouseover", function (event) {document.getElementById("valeur-tabs").innerText = desc["creer"]});
    document.getElementById("recherche").addEventListener("mouseover", function (event) {document.getElementById("valeur-tabs").innerText = desc["recherche"]});
    document.getElementById("visu").addEventListener("mouseover", function (event) {document.getElementById("valeur-tabs").innerText = desc["visu"]});
    document.getElementById("index").addEventListener("mouseover", function (event) {document.getElementById("valeur-tabs").innerText = desc["index"]});
    </script>
  </body>
</html>
