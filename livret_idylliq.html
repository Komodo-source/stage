<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livret Idylliq</title>
  <link href="https://fonts.googleapis.com/css2?family=Julius+Sans+One&family=League+Spartan:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="https://idylliq.fr/favicon.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
  <style>
    /* ── BASE & VARIABLES ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1a5c56; --green-dark: #0f3d3a; --green-mid: #247a73;
      --green-light: #e6f0ef; --green-pale: #f2f8f7;
      --warm: #fcfaf8; --warm-mid: #efebe4; --warm-dark: #d8cebf;
      --ink: #2a2825; --ink-mid: #5c554e; --ink-light: #9c9187;
      --white: #ffffff; --accent: #c48b62; --accent-soft: #dfb393; --accent-pale: #fcf6f1;
      --shadow-soft: 0 15px 45px -10px rgba(15, 61, 58, 0.08), 0 4px 12px rgba(15, 61, 58, 0.03);
      --shadow-hover: 0 30px 65px -15px rgba(15, 61, 58, 0.15), 0 15px 30px rgba(15, 61, 58, 0.06);
      --shadow-deep: 0 45px 100px -20px rgba(15, 61, 58, 0.25);
      --radius: 28px;
      --radius-sm: 20px;
      --gradient-warm: linear-gradient(135deg, #fcf6f1 0%, #fcfaf8 60%, #e6f0ef 100%);
      --gradient-accent: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
      --gradient-green: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      background: var(--warm);
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.8;
    }

    #loading {
      display: flex; align-items: center; justify-content: center; height: 100vh;
      font-family: 'League Spartan', sans-serif; color: var(--green);
      font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase;
    }

    #livret-container {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--white);
      box-shadow: 0 0 60px rgba(0,0,0,0.04);
    }

    /* ── ANIMATIONS ── */
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── COVER PAGE ── */
    .cover-page { position: relative; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .cover-hero { position: absolute; inset: 0; z-index: 1; }
    .cover-hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7) contrast(1.1); transition: transform 10s ease-out; }
    .cover-page:hover .cover-hero img { transform: scale(1.03); }
    .cover-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(21,84,80,0.2) 0%, rgba(21,84,80,0.0) 40%, rgba(21,84,80,0.9) 100%); }

    .cover-brand { position: absolute; top: 3.5rem; left: 4rem; z-index: 2; display: flex; align-items: center; gap: 1rem; }
    .cover-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 15px rgba(212, 149, 106, 0.6); }
    .cover-brand-name { font-family: 'League Spartan', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 6px; text-transform: uppercase; color: var(--white); }

    .cover-content { position: absolute; bottom: 9rem; left: 4rem; right: 4rem; z-index: 2; }
    .cover-title { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: clamp(3.5rem, 7vw, 7rem); color: var(--white); line-height: 1.1; margin-bottom: 1rem; text-transform: none; text-shadow: 0 15px 40px rgba(0,0,0,0.4); word-wrap: break-word; hyphens: auto; letter-spacing: -1px; }

    .cover-chapters { display: flex; gap: 2.5rem; flex-wrap: wrap; margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 2.5rem; }
    .cover-chapter { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; cursor: pointer; transition: var(--transition); }
    .cover-chapter:hover { transform: translateY(-4px); }
    .cover-chapter-num { font-family: 'League Spartan', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
    .cover-chapter-name { font-family: 'League Spartan', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--white); transition: color 0.3s ease; }
    .cover-chapter:hover .cover-chapter-name { color: var(--accent); }

    .cover-strip { position: absolute; bottom: 0; width: 100%; z-index: 3; background: rgba(15,61,58,0.25); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 1.5rem 4rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.15); box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
    .cover-strip-text { font-family: 'League Spartan', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.8); }
    .cover-strip-id { font-family: 'Julius Sans One', sans-serif; font-size: 1.4rem; color: var(--white); letter-spacing: 3px; transition: var(--transition); }
    .cover-strip-id:hover { color: var(--accent); }

    /* ── RECHERCHE FLOTTANTE ── */
    .search-widget { position: fixed; bottom: 90px; right: 2rem; background: var(--white); padding: 1.5rem; border-radius: var(--radius); box-shadow: var(--shadow-hover); width: 320px; max-height: 400px; display: flex; flex-direction: column; gap: 1rem; z-index: 1000; opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); transition: var(--transition); border: 1px solid rgba(0,0,0,0.05); }
    .search-widget.active { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    #search-input { flex: 1; padding: 0.8rem 1.2rem; border: 1px solid var(--warm-mid); border-radius: 30px; outline: none; font-family: 'Outfit', sans-serif; font-size: 1rem; width: 100%; }
    #search-input::placeholder { color: var(--ink-light); }
    .search-results { display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; max-height: 250px; }
    .search-results::-webkit-scrollbar { width: 6px; }
    .search-results::-webkit-scrollbar-thumb { background: var(--warm-dark); border-radius: 10px; }
    .search-result-item { padding: 0.8rem 1rem; border-radius: var(--radius-sm); background: var(--warm); cursor: pointer; transition: var(--transition); font-family: 'Outfit', sans-serif; font-size: 0.95rem; color: var(--ink); line-height: 1.3; }
    .search-result-item:hover { background: var(--green-pale); color: var(--green-dark); }

    /* ── SECTION PAGES ── */
    .theme-page { padding: 8rem 5vw; border-bottom: 1px solid rgba(0,0,0,0.03); position: relative; }
    .theme-page:nth-of-type(even) { background: linear-gradient(180deg, var(--warm) 0%, #ffffff 100%); }
    .theme-header { margin-bottom: 5.5rem; text-align: center; }
    .theme-label { font-family: 'League Spartan', sans-serif; color: var(--accent); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 10px; margin-bottom: 1.5rem; }
    .theme-title { font-family: 'Playfair Display', serif; color: var(--green-dark); font-size: 3.5rem; font-style: italic; font-weight: 400; letter-spacing: -1px; }
    .theme-header::after { content: ''; display: block; width: 60px; height: 1px; background: var(--green-mid); margin: 2rem auto 0; opacity: 0.5; }

    .card { margin-bottom: 5rem; border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow-soft); transition: box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; position: relative; }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); }
    .card-body { padding: 4.5rem; min-width: 0; }
    .card-item-title { font-family: 'Playfair Display', serif; color: var(--green-dark); font-size: 2.2rem; margin-bottom: 1.5rem; font-weight: 400; letter-spacing: -0.5px; line-height: 1.2; }

    .tpl-text-only .card-body { padding: 4.5rem; }

    .tpl-hero .card-hero-img { width: 100%; height: 350px; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .tpl-hero:hover .card-hero-img { transform: scale(1.04); }
    .tpl-hero .img-overlay-wrap { overflow: hidden; position: relative; border-radius: var(--radius) var(--radius) 0 0; }

    .tpl-side-left .card-body:last-child { display: flex; gap: 3.5rem; align-items: flex-start; padding-left: 0; }
    .tpl-side-right .card-body:last-child { display: flex; flex-direction: row-reverse; gap: 3.5rem; align-items: flex-start; padding-right: 0; }
    .tpl-side-left .side-img-wrap.left { flex: 0 0 45%; max-width: 450px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; overflow: hidden; box-shadow: var(--shadow-soft); position: relative; z-index: 1; margin: 0; }
    .tpl-side-right .side-img-wrap.right { flex: 0 0 45%; max-width: 450px; border-radius: var(--radius-sm) 0 0 var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-soft); position: relative; z-index: 1; margin: 0; }
    .tpl-side-left .side-img-wrap img, .tpl-side-right .side-img-wrap img { width: 100%; height: auto; max-height: 500px; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .tpl-side-left:hover .side-img-wrap img, .tpl-side-right:hover .side-img-wrap img { transform: scale(1.05); }
    .tpl-side-left .card-desc, .tpl-side-right .card-desc { flex: 1; min-width: 0; }
    .card-body::after { content: ""; display: table; clear: both; }

    .tpl-portrait-content-wrap { display: flex; gap: 3.5rem; align-items: flex-start; }
    .tpl-portrait-right .tpl-portrait-content-wrap { flex-direction: row-reverse; }
    .tpl-portrait-left .portrait-wrap, .tpl-portrait-right .portrait-wrap { flex: 0 0 320px; overflow: hidden; border-radius: var(--radius-sm); box-shadow: var(--shadow-soft); margin: 0; }
    .portrait-wrap img { width: 100%; height: auto; max-height: 400px; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .portrait-wrap:hover img { transform: scale(1.05); }
    .portrait-text { flex: 1; min-width: 0; }

    .tpl-duo .duo-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px 6px 0 6px; }
    .tpl-duo .duo-strip .duo-img-wrap { overflow: hidden; height: 280px; border-radius: var(--radius-sm); }
    .tpl-duo .duo-strip img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .tpl-duo .duo-strip .duo-img-wrap:hover img { transform: scale(1.05); }

    .tpl-trio .trio-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 6px 6px 0 6px; }
    .tpl-trio .trio-strip .trio-img-wrap { overflow: hidden; height: 220px; border-radius: var(--radius-sm); }
    .tpl-trio .trio-strip img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .tpl-trio .trio-strip .trio-img-wrap:hover img { transform: scale(1.05); }

    .tpl-mosaic .mosaic-grid { display: grid; grid-template-columns: 60% 40%; gap: 6px; height: 350px; padding: 6px 6px 0 6px; }
    .tpl-mosaic .mosaic-main { overflow: hidden; border-radius: var(--radius-sm); }
    .tpl-mosaic .mosaic-side { display: grid; grid-template-rows: 1fr 1fr; gap: 6px; }
    .tpl-mosaic .mosaic-side-top { overflow: hidden; border-radius: var(--radius-sm); }
    .tpl-mosaic .mosaic-side-bot { overflow: hidden; border-radius: var(--radius-sm); position: relative; }
    .tpl-mosaic .mosaic-grid img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .tpl-mosaic .mosaic-main:hover img, .tpl-mosaic .mosaic-side-top:hover img, .tpl-mosaic .mosaic-side-bot:hover img { transform: scale(1.05); }

    .tpl-quad .quad-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px 6px 0 6px; }
    .tpl-quad .quad-strip .quad-img-wrap { overflow: hidden; height: 240px; border-radius: var(--radius-sm); }
    .tpl-quad .quad-strip img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .tpl-quad .quad-strip .quad-img-wrap:hover img { transform: scale(1.05); }

    .tpl-banner .banner-wrap { overflow: hidden; background: var(--warm); border-radius: var(--radius) var(--radius) 0 0; max-height: 220px; display: flex; align-items: center; justify-content: center; }
    .tpl-banner .banner-wrap img { width: 100%; height: auto; max-height: 220px; object-fit: contain; display: block; cursor: zoom-in; transition: transform 0.8s ease; }
    .tpl-banner .banner-wrap:hover img { transform: scale(1.02); }

    /* ── TYPOGRAPHY & DESC ── */
    .card-desc { font-family: 'Outfit', sans-serif; font-size: 1.1rem; line-height: 2; color: var(--ink-mid); font-weight: 300; word-break: break-word; overflow-wrap: anywhere; }
    .card-desc p { margin-bottom: 1.5rem; }
    .card-desc p:last-child { margin-bottom: 0; }
    .card-desc strong { font-weight: 500; color: var(--ink); }
    .card-desc a { color: var(--green-mid); text-decoration: none; border-bottom: 1px solid rgba(42, 138, 131, 0.3); transition: var(--transition); font-weight: 500; word-break: break-all; }
    .card-desc a:hover { border-bottom-color: var(--green-mid); color: var(--green-dark); }

    .kv-line { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 0; border-bottom: 1px solid var(--warm-mid); }
    .kv-line:last-child { border-bottom: none; }
    .kv-key { font-weight: 600; color: var(--green-dark); font-family: 'League Spartan', sans-serif; letter-spacing: 1.5px; text-transform: uppercase; font-size: 0.85rem; }
    .kv-val { color: var(--ink-mid); text-align: right; font-weight: 400; }
    .kv-val a { color: var(--green-mid); text-decoration: none; border-bottom: 1px solid rgba(42, 138, 131, 0.3); font-weight: 500; }
    .kv-val a:hover { color: var(--green-dark); border-bottom-color: var(--green-mid); }

    .category-badge { display: inline-block; background: var(--green-pale); color: var(--green-dark); font-family: 'League Spartan', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; padding: 0.5rem 1.2rem; border-radius: 30px; margin-bottom: 1.5rem; }

    .desc-list { list-style: none; padding: 0; margin: 1rem 0 2rem 0; }
    .desc-list li { position: relative; padding: 0.6rem 0 0.6rem 2.2rem; line-height: 1.7; color: var(--ink-mid); font-size: 1.1rem; font-weight: 300; border-bottom: 1px solid rgba(0, 0, 0, 0.03); }
    .desc-list li:last-child { border-bottom: none; }
    .desc-list li::before { content: ''; position: absolute; left: 0; top: 1.15rem; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .section-label { font-family: 'League Spartan', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--green-dark); margin: 3rem 0 1.5rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .section-label:first-child { margin-top: 0; }

    /* ── HOUSE PHOTOS GALLERY ── */
    .photos-section { border-bottom: 1px solid var(--warm-mid); background: var(--white); }
    .photos-hero { position: relative; height: 500px; overflow: hidden; border-top-left-radius: 15px; border-top-right-radius: 15px; }
    .photos-hero img { width: 100%; height: 100%; object-fit: cover; transition: transform 8s ease; cursor: zoom-in; }
    .photos-hero:hover img { transform: scale(1.04); }
    .photos-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(21,84,80,0.8) 0%, transparent 50%); pointer-events: none; }
    .photos-hero-title { position: absolute; bottom: 2rem; left: 4rem; font-family: 'Julius Sans One', sans-serif; font-size: 2rem; color: var(--white); letter-spacing: 2px; text-transform: uppercase; }

    .room-tabs { display: flex; gap: 1rem; overflow-x: auto; scrollbar-width: none; padding: 2rem 4rem 1rem 4rem; }
    .room-tabs::-webkit-scrollbar { display: none; }
    .room-tab { flex-shrink: 0; padding: 0.75rem 1.8rem; border-radius: 30px; font-family: 'League Spartan', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); cursor: pointer; background: var(--warm); border: 1px solid transparent; transition: var(--transition); white-space: nowrap; }
    .room-tab:hover { color: var(--green); background: var(--warm-mid); }
    .room-tab.active { background: var(--green-dark); color: var(--white); border-color: var(--green-dark); box-shadow: 0 4px 15px rgba(21, 84, 80, 0.2); }

    .room-panel { display: none; padding: 1rem 4rem 4rem; }
    .room-panel.active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
    .room-grid-img { width: 100%; height: 260px; object-fit: cover; border-radius: var(--radius-sm); cursor: zoom-in; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease; will-change: transform; }
    .room-grid-img:hover { transform: scale(1.03); box-shadow: var(--shadow-hover); }

    /* ── ATTENTION BOX ── */
    .attention-box { margin-top: 3.5rem; padding: 3rem 3.5rem; background: var(--gradient-warm); border-radius: var(--radius); position: relative; overflow: hidden; display: flex; gap: 2.5rem; align-items: flex-start; box-shadow: 0 15px 45px -10px rgba(212,149,106,0.15); border: 1px solid rgba(212,149,106,0.2); }
    .attention-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--gradient-accent); }
    .attention-box::after { content: ''; position: absolute; right: -80px; top: -80px; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(212,149,106,0.15), transparent 70%); pointer-events: none; }
    .attention-icon { font-size: 2.5rem; flex-shrink: 0; line-height: 1; filter: drop-shadow(0 4px 10px rgba(212,149,106,0.35)); }
    .attention-content { flex: 1; min-width: 0; }
    .attention-label { font-family: 'League Spartan', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }

    /* ── REGLES DE LA MAISON ── */
    .rules-section { margin-top: 4rem; padding: 3.5rem; background: var(--green-light); border-radius: var(--radius); border: 1px solid rgba(26,92,86,0.15); box-shadow: var(--shadow-soft); }
    .rules-section .section-label { border-bottom-color: rgba(26,92,86,0.2); }
    .rules-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.5rem; }
    .rule-item { display: flex; align-items: flex-start; gap: 1.5rem; padding: 1.5rem 2rem; background: var(--white); border-radius: var(--radius-sm); border-left: 6px solid var(--accent); transition: var(--transition); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .rule-item:hover { transform: translateX(6px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    .rule-num { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; font-weight: 600; color: var(--accent); line-height: 1; min-width: 35px; }
    .rule-text { font-size: 1.15rem; color: var(--ink); line-height: 1.7; font-weight: 400; }

    /* ── GRIDS & RECOS ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; margin-top: 2rem; }
    .cico-card { border-radius: var(--radius); padding: 3.5rem; background: var(--warm); text-align: center; transition: var(--transition); }
    .cico-card:hover { transform: translateY(-4px); background: var(--white); box-shadow: var(--shadow-hover); }
    .cico-label { font-family: 'League Spartan', sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 5px; color: var(--accent); margin-bottom: 1.25rem; }
    .cico-time { font-family: 'Julius Sans One', sans-serif; font-size: 3rem; color: var(--green-dark); }

    .reco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; margin-top: 3rem; }
    .reco-card { border-radius: var(--radius); overflow: hidden; background: var(--white); box-shadow: var(--shadow-soft); transition: box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
    .reco-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .reco-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .reco-name { font-family: 'Julius Sans One', sans-serif; font-size: 1.4rem; font-weight: 600; color: var(--green-dark); text-transform: uppercase; margin-bottom: 0.75rem; line-height: 1.3; }
    .reco-score { font-family: 'League Spartan', sans-serif; font-size: 0.8rem; color: var(--white); background: var(--accent); padding: 0.3rem 1rem; border-radius: 20px; display: inline-block; margin-bottom: 1.25rem; align-self: flex-start; letter-spacing: 1px; }
    .reco-desc { flex: 1; }

let _lbImages = [], _lbIndex = 0;

function openLightbox(src, imagesArr, index) {
  _lbImages = Array.isArray(imagesArr) ? imagesArr : [src];
  _lbIndex  = typeof index === 'number' ? index : 0;

function toggleZoom(img) {

  } else {

    else if (document.webkitFullscreenElement && document.webkitExitFullscreen) document.webkitExitFullscreen();

/* ─────────────────────────────────────────────────────────────
   INTERSECTION OBSERVER FIX POUR LA NAVIGATION ACTIVE
───────────────────────────────────────────────────────────── */
function initScrollSpy() {
  const navLinks = document.querySelectorAll(".nav-link");
  const observerOptions = {
    root: null,
    rootMargin: "-20% 0px -70% 0px", // Permet d'activer le lien quand la section atteint le haut de l'écran
    threshold: 0
  };

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navLinks.forEach(link => {
          // On compare l'href avec l'id trouvé
          if (link.getAttribute("href") === `#${id}`) {
            link.classList.add("active");
          } else {
            link.classList.remove("active");
          }
        });
      }
    });
  }, observerOptions);

  navLinks.forEach(link => {
    const targetId = link.getAttribute("href").substring(1);
    let targetSection = document.getElementById(targetId);

    // Fallback pour la casse (ex: Airtable génère "id=Intérieur" mais le lien est href="#intérieur")
    if (!targetSection) {
      const allEls = document.querySelectorAll('[id]');
      for (let el of allEls) {
        if (el.id.toLowerCase() === targetId.toLowerCase()) {
          targetSection = el;
          link.setAttribute("href", `#${el.id}`); // On corrige le lien dynamique pour qu'il marche au clic
          break;
        }
      }
    }

    if (targetSection) observer.observe(targetSection);
  });
}

    if (offset) url.searchParams.set('offset', offset);

  } while (offset);
  return records;
}

/* ─────────────────────────────────────────────────────────────
   FIX 1: detectVideoType — check extension first, then domain
───────────────────────────────────────────────────────────── */
function detectVideoType(url) {
  if (!url || typeof url !== 'string') return null;
  // Check by file extension first — works for any CDN/S3 host
  if (/\.(mp4|webm|ogg|mov|m4v|avi)([?#]|$)/i.test(url)) return 'native';
  const u = url.toLowerCase();
  if (u.match(/(youtube\.com|youtu\.be)/)) return 'youtube';
  if (u.includes('vimeo.com')) return 'vimeo';
  // Airtable attachment CDN (various S3/CDN domains)
  if (u.includes('airtableusercontent.com') || u.includes('dl.airtable.com')) return 'native';
  return 'iframe';
}

function extractYouTubeId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function renderVideo(url) {
  const type = detectVideoType(url);
  if (type === 'youtube') {
    const id = extractYouTubeId(url);
    if (!id) return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen></iframe>`;
    return `<iframe src="https://www.youtube.com/embed/${id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
  }
  if (type === 'vimeo') {
    const id = url.match(/vimeo\.com\/(\d+)/)?.[1];
    if (!id) return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen></iframe>`;
    return `<iframe src="https://player.vimeo.com/video/${id}" frameborder="0" allowfullscreen></iframe>`;
  }
  if (type === 'native') return `<video controls preload="metadata" style="width:100%;max-height:400px;border-radius:var(--radius-sm);display:block;margin:1.5rem 0;box-shadow:var(--shadow-soft);"><source src="${escapeAttr(url)}">Votre navigateur ne supporte pas la vidéo.</video>`;
  return `<iframe src="${escapeAttr(url)}" frameborder="0" allowfullscreen></iframe>`;
}

function is_file_image(str) { return /\.(jpg|jpeg|png|gif|webp|svg|tiff|psd|raw|avif)$/i.test(str || ''); }
function escapeHtml(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(str) { return (str || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

/* ─────────────────────────────────────────────────────────────
   IMAGE CLASS SELECTION
───────────────────────────────────────────────────────────── */
function getInlineImgClass(width, height) {
  if (!width || !height) return 'inline-img-landscape';
  const ratio = width / height;
  if (height <= 250 && ratio > 1.5) return 'inline-img-banner';
  if (ratio > 1.2) return 'inline-img-landscape';
  if (ratio >= 0.8) return 'inline-img-square';
  return 'inline-img-portrait';
}

/* ─────────────────────────────────────────────────────────────
   CARD TEMPLATE SELECTOR
───────────────────────────────────────────────────────────── */
function pickTemplate(photos) {
  const n = photos.length;
  if (n === 0) return 'text-only';
  if (n === 1) {
    const p = photos[0];
    const ratio = p.width && p.height ? p.width / p.height : 1.5;
    if (p.height <= 250 && ratio > 1.5) return 'banner';
    if (ratio > 1.6) return 'hero';
    if (ratio > 1.1) return 'side-left';
    if (ratio < 0.75) return 'portrait-left';
    return 'hero';
  }
  if (n === 2) return 'duo';
  if (n === 3) return 'trio';
  if (n === 4) return 'quad';
  return 'mosaic';
}

/* ─────────────────────────────────────────────────────────────
   FIX 2: renderEquipCard — use slugified raw title for id
───────────────────────────────────────────────────────────── */
function slugify(str) {
  return (str || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

  const photos  = Array.isArray(item._attachments)
    ? item._attachments.filter(a => is_file_image(a.filename || ''))

  const title = `<h3 class="card-item-title">${escapeHtml(item.Item)}</h3>`;
  const desc  = `<div class="card-desc">${parseDescriptionWithInline(item.Description, item._attachments, item._videos)}</div>`;

      const p = photos[0];
      return `<article id="${cardId}" class="card tpl-side-left reveal"><div class="card-body" style="width:100%;padding-bottom:0;">${badge}${title}</div><div class="card-body"><div class="side-img-wrap left"><img src="${escapeAttr(p.url)}" loading="lazy" alt="${escapeAttr(item.Item)}" ${imgClick(p.url, 0)}></div>${desc}</div></article>`;
    }

    case 'side-right': {
      const p = photos[0];
      return `<article id="${cardId}" class="card tpl-side-right reveal"><div class="card-body" style="width:100%;padding-bottom:0;">${badge}${title}</div><div class="card-body"><div class="side-img-wrap right"><img src="${escapeAttr(p.url)}" loading="lazy" alt="${escapeAttr(item.Item)}" ${imgClick(p.url, 0)}></div>${desc}</div></article>`;
    }

    case 'portrait-left': {
      const p = photos[0];
      return `<article id="${cardId}" class="card tpl-portrait-left reveal"><div class="card-body">${badge}${title}<div class="tpl-portrait-content-wrap"><div class="portrait-wrap"><img src="${escapeAttr(p.url)}" loading="lazy" alt="${escapeAttr(item.Item)}" ${imgClick(p.url, 0)}></div><div class="portrait-text">${desc}</div></div></div></article>`;
    }

    case 'portrait-right': {
      const p = photos[0];
      return `<article id="${cardId}" class="card tpl-portrait-right reveal"><div class="card-body">${badge}${title}<div class="tpl-portrait-content-wrap"><div class="portrait-wrap"><img src="${escapeAttr(p.url)}" loading="lazy" alt="${escapeAttr(item.Item)}" ${imgClick(p.url, 0)}></div><div class="portrait-text">${desc}</div></div></div></article>`;
    }

    case 'duo': {
      const strip = photos.slice(0, 2).map((p, i) => `<div class="duo-img-wrap"><img src="${escapeAttr(p.url)}" loading="lazy" alt="" ${imgClick(p.url, i)}></div>`).join('');
      return `<article id="${cardId}" class="card tpl-duo reveal"><div class="card-body" style="padding-bottom:0;">${badge}${title}</div><div class="duo-strip">${strip}</div><div class="card-body">${desc}</div></article>`;

    case 'trio': {

    case 'quad': {

      return `<article id="${cardId}" class="card tpl-quad reveal"><div class="card-body" style="padding-bottom:0;">${badge}${title}</div><div class="quad-strip">${strip}</div><div class="card-body">${desc}</div></article>`;
    }

    case 'mosaic': {
      const [p0, p1, p2] = photos;
      const extra = photos.length > 3 ? photos.length - 3 : 0;
      const moreLabel = extra ? `<div style="position:absolute;inset:0;background:rgba(21,84,80,0.65);display:flex;align-items:center;justify-content:center;font-family:'League Spartan',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;cursor:zoom-in;" ${imgClick(p0.url, 0)}>+${extra}</div>` : '';

  }
}

/* ─────────────────────────────────────────────────────────────
   FIX 3: groupConsecutiveImages — simplified onerror (no broken JS escaping)
───────────────────────────────────────────────────────────── */
function groupConsecutiveImages(html) {
  // Add simple onerror to hide broken images — no complex JS inside attribute
  html = html.replace(/<img\b([^>]*)>/g, (m, attrs) => {
    if (/onerror=/i.test(attrs)) return m;
    return `<img${attrs} onerror="this.style.display='none'">`;
  });
  // Wrap runs of consecutive <img> tags into adaptive grid containers
  return html.replace(
    /(?:<img\b[^>]*>\s*(?:<br\s*\/?>\s*)*){2,}/g,
    (block) => {
      const imgs = block.match(/<img\b[^>]*>/g) || [];
      const count = Math.min(imgs.length, 6);
      return `<div class="inline-media-stack" data-count="${count}">${imgs.join('')}</div>`;
    }
  );
}

function linkifyUrls(text) {
  return text.replace(/((?:https?:\/\/[^\s<"'\)\]]+)|(?:www\.[^\s<"'\)\]]+))/g, (match) => {
    if (match.includes('airtableusercontent.com')) return '';
    let href = match.startsWith('www.') ? 'https://' + match : match;
    const display = match.length > 55 ? match.slice(0, 52) + '…' : match;
    return `<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(display)}</a>`;
  });
}

function parseDescriptionWithInline(text, attachments, videos) {
  if (!text) return '';
  const photos = Array.isArray(attachments) ? attachments.filter(a => is_file_image(a.filename || '')) : [];
  const allUrls = photos.map(p => p.url);
  let out = text;

  // Replace $iN beacons with inline images
  photos.forEach((photo, i) => {
    const url = photo.url || '';
    if (!url) return;
    const cls = getInlineImgClass(photo.width || 0, photo.height || 0);
    const safeUrl = url.replace(/'/g, "\\'");
    const imgTag  = `<img src="${escapeAttr(url)}" class="${cls}" loading="lazy" onclick="openLightbox('${safeUrl}', ${JSON.stringify(allUrls).replace(/"/g, '&quot;')}, ${i})" alt="">`;
    out = out.replace(new RegExp('\\$i' + i + '(?!\\d)', 'g'), imgTag);
  });

  // Replace $vN beacons with video embeds
  if (Array.isArray(videos)) {
    videos.forEach((url, i) => {
      if (!url) return;
      out = out.replace(new RegExp('\\$v' + i + '(?!\\d)', 'g'), renderVideo(url));
    });
  }

  // Strip any leftover unmatched beacons
  out = out.replace(/\$[iv]\d+/g, '');

  const isHtml = /<\/?(h[1-6]|p|ul|ol|li|div|table|br)\b/i.test(out);

  if (isHtml) {
    out = out.replace(/(<[^>]+>)|((?:https?:\/\/|www\.)[^\s<"'\)\]]+)/g, (m, tag, url) => {
      if (tag) return tag;
      if (url.includes('airtableusercontent.com')) return '';
      const href = url.startsWith('www.') ? 'https://' + url : url;
      const display = url.length > 55 ? url.slice(0, 52) + '…' : url;
      return `<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${escapeHtml(display)}</a>`;
    });
    out = out.replace(/<li>\s*(?:N[O°]\.?\s*\d+\s*[-:.)]?\s*|\d+\.\s+|[-•*]\s+)/gi, '<li>');
    return groupConsecutiveImages(out);
  }

  out = linkifyUrls(out);

  const lines = out.split('\n').map(l => l.trim()).filter(Boolean);
  const rendered = [];
  let inList = false;
  const closeList = () => { if (inList) { rendered.push('</ul>'); inList = false; } };

  for (const line of lines) {
    if (/^(?:<img\b[^>]*>\s*)+$/.test(line)) {
      closeList();
      rendered.push(line);
      continue;
    }
    if (/^<(iframe|video|div|p|h[1-6]|ul|ol|li)/.test(line)) {
      closeList();
      rendered.push(line);
      continue;
    }

    const isSectionHeader = (
      (/^[A-ZÉÈÀÙÂÊÎÔÛÇ0-9\/\- ]{3,50}:?$/.test(line) && line === line.toUpperCase() && !line.includes('http')) ||
      (/^[A-ZÉÈÀÙÂÊÎÔÛÇ][\w\s]{2,40}:$/.test(line) && line.length < 50)
    );
    if (isSectionHeader && line.length > 2) {
      closeList();
      rendered.push(`<p class="section-label">${escapeHtml(line.replace(/:$/, ''))}</p>`);
      continue;
    }

    const bulletMatch = line.match(/^(?:[-•*]\s+|N[O°]\.?\s*\d+\s*[-:.)]?\s*|\d+\s*[.)]\s+)/i);
    if (bulletMatch) {
      const clean = line.slice(bulletMatch[0].length).trim();
      if (!inList) { rendered.push('<ul class="desc-list">'); inList = true; }
      rendered.push(`<li>${clean}</li>`);
      continue;
    }

    closeList();

    const colonIdx = line.indexOf(': ');
    if (colonIdx > 0 && colonIdx < 55 && !line.startsWith('<')) {
      const left = line.slice(0, colonIdx), right = line.slice(colonIdx + 2);
      if (!left.includes('<') && !/https?:\/\//.test(left)) {
        rendered.push(`<div class="kv-line"><span class="kv-key">${escapeHtml(left)}</span><span class="kv-val">${right}</span></div>`);
        continue;
      }
    }

    rendered.push(`<p>${line}</p>`);
  }

  closeList();
  return groupConsecutiveImages(rendered.join(''));
}

function parseDescription(text, attachments, hideInlineImages) {
  const atts = hideInlineImages ? [] : (attachments || []);

  const vidUrls = atts
    .filter(a => /\.(mp4|webm|ogg|mov|m4v|avi)$/i.test(a.filename || ''))
    .map(a => a.url);

  return parseDescriptionWithInline(
    hideInlineImages ? (text || '').replace(/\$[iv]\d+/g, '') : text,
    atts,
    vidUrls
  );
}

function get_global_info_maison(rec) {
  if (!rec) return '';
  const f = rec.fields;

  const weatherHtml = `<div id="weather-widget-container" class="reveal"></div>`;
  const descHtml = f.Description ? `<div class="card-desc">${parseDescription(f.Description, null, false)}</div>` : '';
  let attentionHtml = '';
  if (f.PointAttention) {
    attentionHtml = `
      <aside class="attention-box reveal" id="point-attention">
        <div class="attention-icon">💡</div>
        <div class="attention-content">
          <div class="attention-label">Point d'attention</div>
          <div class="card-desc">${parseDescription(f.PointAttention, f.mediaPointAttention || [], false)}</div>
        </div>
      </aside>`;
  }

  let reglesHtml = '';
  const regleField = f.regle || f.Regle || f.Regles || f.regles;
  if (regleField) {
    const regles = parseRegles(regleField);
    if (regles.length) {
      const reglesItems = regles.map((r, i) => `
        <div class="rule-item">
          <span class="rule-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="rule-text">${escapeHtml(r)}</span>
        </div>`).join('');
      reglesHtml = `
        <details class="elegant-accordion reveal" style="margin-top: 3rem;">
          <summary>Règles de la maison</summary>
          <div class="accordion-content">
            <div class="rules-grid">${reglesItems}</div>
          </div>
        </details>`;
    }
  }

  return `
    <section id="section-info" class="theme-page reveal">
      ${weatherHtml}
      <div class="theme-header"><div class="theme-label">Découvrir</div><div class="theme-title">La Maison</div></div>
      ${descHtml}${reglesHtml}${attentionHtml}
    </section>`;
}

function parseRegles(text) {
  if (!text) return [];
  let s = String(text)
    .replace(/\s*(N[O°o]\.?\s*\d+\s*[:.\)\-]?\s*)/g, '\n')
    .replace(/(?:^|\n|\.)\s*(\d+\s*[\.\)]\s+)/g, '\n')
    .replace(/\s*[•\-\*]\s+/g, '\n');
  const lines = s.split(/\n+/).map(l => l.trim().replace(/^[:.\-)\s]+/, '').replace(/\s+/g, ' ').trim()).filter(Boolean);
  return lines;
}

function getCICO(workflowRecords, maisonId) {
  const related = workflowRecords.filter(r => (r.fields.Maison || []).includes(maisonId));
  if (!related.length) return '';
  const cicoRec = related.find(r => r.fields.CICO);
  if (!cicoRec) return '';
  const parts    = (cicoRec.fields.CICO || '').split(';');
  const checkin  = (parts[0] || '').trim().replace(/:\d\d$/, '') || "Non défini";
  const checkout = (parts[1] || '').trim().replace(/:\d\d$/, '') || "Non défini";

  return `
    <section id="section-sejour" class="theme-page reveal" style="background:var(--white);">
      <div class="theme-header"><div class="theme-label">Organisation</div><div class="theme-title">Votre Séjour</div></div>
      <div class="grid-2">
        <div class="cico-card"><div class="cico-label">Heure d'arrivée</div><div class="cico-time">${escapeHtml(checkin)}</div></div>
        <div class="cico-card"><div class="cico-label">Heure de départ</div><div class="cico-time">${escapeHtml(checkout)}</div></div>
      </div>
    </section>`;
}

function renderPiscinePage(rec) {
  if (!rec) return '';
  const f = rec.fields;

  const allPhotos = f.Photo || [];
  const youtubeVids = f.lienYoutube ? f.lienYoutube.split(';').map(v => v.trim()).filter(Boolean) : [];

  const attachedVids = allPhotos
    .filter(a => /\.(mp4|webm|ogg|mov|m4v|avi)$/i.test(a.filename || ''))
    .map(a => a.url);

  const videos = [...youtubeVids, ...attachedVids];

  const validSections = [
    { label: "Instructions d'ouverture", text: f.InstructionOuverture },
    { label: "Instructions de fermeture", text: f.InstructionFermeture }
  ].filter(s => s.text && s.text.trim());

  if (!validSections.length) return '';

  if (validSections.length === 1) {
    validSections[0].bounds = { pStart: 0, pEnd: allPhotos.length, vStart: 0, vEnd: videos.length };
  } else {
    const halfP = Math.ceil(allPhotos.length / 2);
    const halfV = Math.ceil(videos.length / 2);
    validSections[0].bounds = { pStart: 0, pEnd: halfP, vStart: 0, vEnd: halfV };
    validSections[1].bounds = { pStart: halfP, pEnd: allPhotos.length, vStart: halfV, vEnd: videos.length };
  }

  const cardsHtml = validSections.map((section, idx) => {
    const bounds = section.bounds;

    const sectionPhotos = allPhotos.slice(bounds.pStart, bounds.pEnd);
    const sectionVideos = videos.slice(bounds.vStart, bounds.vEnd);

    let enrichedText = section.text;
    if (bounds.pStart > 0) {
      for (let i = bounds.pEnd - 1; i >= bounds.pStart; i--) {
        enrichedText = enrichedText.replace(
          new RegExp('\\$i' + i + '(?!\\d)', 'g'),
          '$i' + (i - bounds.pStart)
        );
      }
    }
    if (bounds.vStart > 0) {
      for (let i = bounds.vEnd - 1; i >= bounds.vStart; i--) {
        enrichedText = enrichedText.replace(
          new RegExp('\\$v' + i + '(?!\\d)', 'g'),
          '$v' + (i - bounds.vStart)
        );
      }
    }
    enrichedText = enrichedText.replace(/\$i(?!\d)/g, '$i0').replace(/\$v(?!\d)/g, '$v0');

    const usedPIdx = [...enrichedText.matchAll(/\$i(\d+)/g)].map(m => +m[1]);
    const freePhotos = sectionPhotos.map((_, i) => i).filter(i => !usedPIdx.includes(i));
    if (freePhotos.length) {
      enrichedText += '\n\n' + freePhotos.map(i => '$i' + i).join(' ');
    }

    const usedVIdx = [...enrichedText.matchAll(/\$v(\d+)/g)].map(m => +m[1]);
    const freeVideos = sectionVideos.map((_, i) => i).filter(i => !usedVIdx.includes(i));
    if (freeVideos.length) {
      enrichedText += '\n\n' + freeVideos.map(i => '$v' + i).join('\n');
    }

    const descHtml = parseDescriptionWithInline(enrichedText, sectionPhotos, sectionVideos);



    return `
      <details class="elegant-accordion reveal" ${idx === 0 ? 'open' : ''}>
        <summary>${escapeHtml(section.label)}</summary>
        <div class="accordion-content">
          <div class="card-desc">${descHtml}</div>
        </div>
      </details>
    `;
  }).join('');
    const navi = document.getElementById("sticky-nav");
    const piscine = document.createElement("a");
    piscine.className = "nav-link";
    piscine.href = "#section-piscine";
    piscine.innerText = "Piscine";
    console.log(navi.childNodes);
    navi.insertBefore(piscine, navi.childNodes[10]);
    has_piscine = true;

  return `
    <section id="section-piscine" class="theme-page reveal">
      <div class="theme-header"><div class="theme-label">Détente</div><div class="theme-title">La Piscine</div></div>
      ${cardsHtml}
    </section>`;
}

function getRecommandation(data, maisonId) {
  const related = data.filter(r => (r.fields.Maison || []).includes(maisonId));
  if (!related.length) return '';
  const cards = related.map(r => {
    const f = r.fields;
    let mapsLink = '';
    if (f.localisation) { const c = f.localisation.replace(';',','); mapsLink = `<a class="reco-link" href="https://maps.google.com/?q=${encodeURIComponent(c)}" target="_blank" rel="noopener">Y aller →</a>`; }
    else if (f.google_place_id) mapsLink = `<a class="reco-link" href="https://maps.google.com/?cid=${f.google_place_id}" target="_blank" rel="noopener">Y aller →</a>`;
    const score = f.Score ? parseFloat(f.Score).toFixed(1) : null;
    return `<article class="reco-card reveal">
      <div class="reco-body">
        <h3 class="reco-name">${escapeHtml(f.NomRecommandation || '–')}</h3>
        ${score ? `<div class="reco-score">${score} ★</div>` : ''}
        ${f.Adress ? `<div class="card-desc" style="font-size:.85rem;margin-bottom:1rem;opacity:.8;">📍 ${escapeHtml(f.Adress)}</div>` : ''}
        <div class="card-desc reco-desc">${escapeHtml(f.Description || '')}</div>
      </div>${mapsLink}
    </article>`;
  }).join('');
  return `
    <section id="section-reco" class="theme-page reveal">
      <div class="theme-header">
        <div class="theme-label">Coups de cœur</div>
        <div class="theme-title">Nos Adresses</div>
      </div>
      <div class="mood-filters reveal">
        <button class="mood-filter active">Tout</button>
        <button class="mood-filter">Commerce</button>
        <button class="mood-filter">Visite</button>
        <button class="mood-filter">Restaurant</button>
      </div>
      <div class="reco-grid">${cards}</div>
    </section>`;
}

function get_instruction_depart(rec) {
  if (!rec?.fields?.InstructionDepart) return '';

  let rawText = rec.fields.InstructionDepart;
  rawText = rawText.replace(/<\/?(div|p|br|h[1-6]|li|ul|ol|table|tr)[^>]*>/gi, '\n');
  rawText = rawText.replace(/<[^>]+>/g, '');

  const txt = document.createElement("textarea");
  txt.innerHTML = rawText;
  rawText = txt.value;

  const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
  let out = '';
  let inList = false;

  for (let line of lines) {
    const isHeader = line === line.toUpperCase() && line.length > 2 && /[A-ZÉÈÀÙÂÊÎÔÛÇ]/.test(line);
    const isListItem = /^(?:[-•*]\s+|\d+\.\s+)/.test(line);

    if (isHeader) {
      if (inList) { out += '</ul>'; inList = false; }
      out += `<h2 style="font-family: 'League Spartan', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--green-dark); margin: 2.5rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(0,0,0,0.05);">${escapeHtml(line)}</h2>`;
    } else if (isListItem) {
      if (!inList) { out += '<ul class="checkout-list" style="margin-top:0.5rem; margin-bottom:1.5rem;">'; inList = true; }
      const cleanLine = line.replace(/^(?:[-•*]\s+|\d+\.\s+)/, '');
      out += `<li onclick="this.classList.toggle('done')"><div class="check-circle"></div><span>${escapeHtml(cleanLine)}</span></li>`;
    } else {
      if (inList) { out += '</ul>'; inList = false; }
      out += `<p style="margin-bottom: 1rem;">${escapeHtml(line)}</p>`;
    }
  }
  if (inList) out += '</ul>';

  return `<section class="theme-page" id="instruction-depart">
            <div class="card reveal" style="margin-top:0;">
              <div class="card-body">
                <div class="category-badge">Check-out</div>
                <h3 class="card-item-title">Instructions de départ</h3>
                <div class="card-desc">
                  <p style="font-style: italic; color: var(--ink-mid); margin-bottom: 2rem;">Cliquez sur les tâches une fois accomplies pour préparer votre départ en toute sérénité.</p>
                  ${out}
                </div>
              </div>
            </div>
          </section>`;
}

async function fetchWeather(address) {
  const apiKey = '538bd19bdaba907b8535672e0b3cb600';
  let query = "Paris,FR";
  if (address) {
    const match = address.match(/\d{5}\s+([A-Za-z\s\-]+)/);
    if (match && match[1]) query = match[1].trim() + ",FR";
    else query = address.split(',').pop().trim() + ",FR";
  }
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(query)}&units=metric&lang=fr&appid=${apiKey}`);
    if (!res.ok) throw new Error('Weather fetch failed');
    const data = await res.json();
    const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
    const temp = Math.round(data.main.temp);
    const desc = data.weather[0].description;
    let suggestion = "Une belle journée pour explorer les environs.";
    const mainCondition = data.weather[0].main.toLowerCase();
    if (mainCondition.includes('rain')) suggestion = "Temps pluvieux : profitez d'une soirée cinéma ou du feu de cheminée.";
    else if (mainCondition.includes('clear') && temp > 22) suggestion = "Grand soleil ! C'est le moment idéal pour profiter de la piscine.";
    else if (temp < 10) suggestion = "Il fait frais dehors, une bonne journée pour le jacuzzi ou le sauna.";
    document.getElementById('weather-widget-container').innerHTML = `
      <div class="weather-widget">
        <img src="${iconUrl}" alt="Weather Icon" class="weather-icon" style="width: 80px; height: 80px; object-fit: cover;">
        <div>
          <div class="weather-temp">${temp}°C</div>
          <div class="weather-desc">${desc}</div>
        </div>
        <div class="weather-suggestion"><p>${suggestion}</p></div>
      </div>`;
  } catch(e) { console.warn('Could not fetch weather data', e); }
}

async function buildLivret(IdMaison) {
  const [ maisonRecs, livretRecs, equipRecs, piscineRecs, wfRecs, recoRecs, listRecs ] =
    await Promise.all([
      fetchAll(TABLE_MAISON), fetchAll(TABLE_LIVRET), fetchAll(TABLE_EQUIPEMENT),
      fetchAll(TABLE_PISCINE), fetchAll(TABLE_WORKFLOW),
      fetchAll(TABLE_RECOMMANDATION), fetchAll(TABLE_LISTE_MAISON)
    ]);

  const maisonRecord = maisonRecs.find(r => r.fields.IdMaison === IdMaison && r.fields.Livret);
  if (!maisonRecord) { document.getElementById('loading').innerText = `Maison introuvable pour "${IdMaison}".`; return; }

  const listData  = listRecs.find(r => r.fields.IdMaison === IdMaison);
  const nomMaison = listData?.fields?.NomMaison || IdMaison;
  const coverImg  = listData?.fields?.ImageMaison?.[0]?.url || '';

  const livretIds = maisonRecord.fields['Livret 2'] || [];
  const equipIds  = new Set();

  livretRecs.filter(r => livretIds.includes(r.id)).forEach(lr => (lr.fields.equipement || []).forEach(id => equipIds.add(id)));

  const themeMap = {};
  const allEquipItems = [];

  equipRecs.filter(r => equipIds.has(r.id)).forEach(rec => {
    const catArr = rec.fields['Catégorie'];
    const cat    = Array.isArray(catArr) ? catArr[0] : (catArr || 'Général');
    if (!themeMap[cat]) themeMap[cat] = [];
    const allPhotos = (rec.fields.Photos || []);
    const youtubeVids = rec.fields.lienYoutube ? rec.fields.lienYoutube.split(';').map(v => v.trim()).filter(Boolean) : [];

    const attachedVids = allPhotos
      .filter(a => /\.(mp4|webm|ogg|mov|m4v|avi)$/i.test(a.filename || ''))
      .map(a => a.url);

    const videos = [...youtubeVids, ...attachedVids];
    const item = {
      Item: rec.fields.NomEquipement || '–',
      Description: rec.fields.descriptionLivret || '',
      Categorie: cat,
      _attachments: allPhotos,
      _videos: videos
    };
    themeMap[cat].push(item);
    allEquipItems.push(item);
  });

  let piscineSectionHtml = maisonRecord.fields['Piscine'];

  if(maisonRecord.fields['Piscine']){
    piscineSectionHtml = renderPiscinePage(piscineRecs.find(p => (maisonRecord.fields['Piscine'] || []).includes(p.id)));


  }


  console.log("themeMap", themeMap);


  let ordered = Object.keys(themeMap)
    .sort()

    .reduce((obj, key) => {
      obj[key] = themeMap[key]; // Rebuild the object with sorted keys
      return obj;
    }, {});

    console.log(ordered)

  let un = Object.keys(ordered)
    .reverse()
    .reduce((obj, key) => {
      obj[key] = ordered[key];
      return obj;
    }, {});

  console.log("themeMap", un);
  const html =
    renderCover(nomMaison, IdMaison, coverImg) +
    get_global_info_maison(maisonRecord) +
    getCICO(wfRecs, maisonRecord.id) +
    renderIconsSection(allEquipItems) +
    Object.keys(un).map((th, idx) => renderThemePage(th, un[th], idx)).join('') +
    piscineSectionHtml +
    getRecommandation(recoRecs, maisonRecord.id) +
    get_instruction_depart(maisonRecord) +
    `<section class="presentation-end reveal">
       <h1>La Collection Idylliq</h1>
       <p>Cette propriété fait partie de la première collection de maisons haut de gamme pensée pour les familles.</p>
     </section>
     <footer class="end-page">
       <h1>Excellent Séjour</h1>
       <p onclick="window.open('https://idylliq.fr/')" style="cursor:pointer">idylliq.fr</p>
     </footer>`;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('livret-container').innerHTML = html;

  // Lancement du ScrollSpy après l'intégration du HTML
  initScrollSpy();

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

function toggleSearch() {
  const widget = document.getElementById('search-widget');
  widget.classList.toggle('active');
  if (widget.classList.contains('active')) {
    document.getElementById('search-input').focus();
    document.getElementById('floating-menu').classList.remove('active'); // Ferme le menu +
  }
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const resultsContainer = document.getElementById('search-results');
  resultsContainer.innerHTML = '';

  if (!q) return;

  const cards = document.querySelectorAll('.card, .reco-card, .elegant-accordion');
  let matchCount = 0;

  cards.forEach(card => {
    if (card.textContent.toLowerCase().includes(q)) {
      const titleEl = card.querySelector('.card-item-title, .reco-name, summary');
      const title = titleEl ? titleEl.textContent : 'Section correspondante';

      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.textContent = title;
      div.onclick = () => {
        // Scroll & feedback visuel
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.transition = 'box-shadow 0.4s ease';
        card.style.boxShadow = '0 0 0 4px var(--accent)';
        if (card.tagName === 'DETAILS') card.open = true;
        setTimeout(() => card.style.boxShadow = '', 2500);

        toggleSearch(); // Ferme le widget
      };
      resultsContainer.appendChild(div);
      matchCount++;
    }
  });

  if (matchCount === 0) {
    resultsContainer.innerHTML = '<div style="text-align:center; color:var(--ink-light); padding:1rem;">Aucun résultat</div>';
  }
}

const urlParams = new URLSearchParams(window.location.search);
const idMaison  = urlParams.get('maison');
if (!idMaison) {
  document.getElementById('loading').innerText = "Veuillez indiquer l'identifiant de la maison (?maison=M7)";
} else {
  buildLivret(idMaison).then(() => {
    const filters = document.querySelectorAll('.mood-filter');
    const cards = document.querySelectorAll('.reco-card');
    filters.forEach(btn => {
      btn.addEventListener('click', () => {
        filters.forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        const filterText = btn.innerText.toLowerCase();
        cards.forEach(card => {
          if (filterText === 'tout') {
            card.style.display = '';
          } else {
            const cardText = card.innerText.toLowerCase();
            const keyword = filterText.split(' ')[0];
            card.style.display = (cardText.includes('famille') || cardText.includes(keyword) || Math.random() > 0.5) ? '' : 'none';
          }
        });
      });
    });
  }).catch(err => {
    console.error(err);
    document.getElementById('loading').innerText = 'Erreur : ' + err.message;
  });
}
