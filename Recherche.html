      /* ── update record ── */
      async function updateRecord(table, recId, fieldName, newValue) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}/${recId}`;
        const res = await fetch(url, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { [fieldName]: newValue } }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
        return data;
      }

      let editCtx = null;

      function filter_houses() {
        const sel = document.getElementById('house-filter');
        const searched_value = document.getElementById("search-houses").value;

        while (sel.options.length > 1) {
          sel.remove(sel.options.length - 1);
        }

        if (!searched_value) {
          // Restore all houses when search is cleared
          all_houses.forEach((h) => {
            const opt = document.createElement('option');
            opt.value = h;
            opt.textContent = h;
            sel.appendChild(opt);
          });
          return;
        }

        const q = searched_value.toLowerCase();
        all_houses.forEach((h) => {
          if (h.toLowerCase().includes(q)) {
            const opt = document.createElement('option');
            opt.value = h;
            opt.textContent = h;
            sel.appendChild(opt);
          }
        });
      }

      function openEditModal(table, recId, field, valueEl) {
        const rawValue = valueEl ? valueEl.innerText : '';
        editCtx = { table, recId, field, valueEl };
        document.getElementById('edit-field-name').textContent = field;
        document.getElementById('edit-meta').textContent = `${table}  ·  ${recId}`;
        document.getElementById('edit-textarea').value = rawValue;
        document.getElementById('edit-save-btn').disabled = false;
        document.getElementById('edit-save-btn').textContent = 'Sauvegarder';
        document.getElementById('edit-modal').classList.add('open');
        setTimeout(() => document.getElementById('edit-textarea').focus(), 50);
      }

      function closeEditModal() {
        document.getElementById('edit-modal').classList.remove('open');
        editCtx = null;
      }

      document.addEventListener('click', (e) => {
        const btn = e.target.closest('.edit-btn');
        if (!btn) return;
        e.stopPropagation();
        const { table, recid, field } = btn.dataset;
        const container = btn.closest('.field-block, .cell-nom');
        const valueEl = container?.querySelector('.field-value') ?? null;
        openEditModal(table, recid, field, valueEl);
      });

      document.getElementById('edit-close-btn').addEventListener('click', closeEditModal);
      document.getElementById('edit-cancel-btn').addEventListener('click', closeEditModal);
      document.getElementById('edit-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeEditModal();
      });

      document.getElementById('edit-save-btn').addEventListener('click', async () => {
        if (!editCtx) return;
        const newVal = document.getElementById('edit-textarea').value;
        const saveBtn = document.getElementById('edit-save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Sauvegarde…';
        try {
          await updateRecord(editCtx.table, editCtx.recId, editCtx.field, newVal);
          if (editCtx.valueEl) editCtx.valueEl.innerHTML = esc(newVal).replace(/\n/g, '<br>');
          // Sync allRows
          allRows.forEach((row) => {
            if (row.recId !== editCtx.recId || row.recTable !== editCtx.table) return;
            if (row.nomField === editCtx.field) row.nom = newVal;
            const part = row.descParts?.find((p) => p.field === editCtx.field);
            if (part) { part.value = newVal; row.description = row.descParts.map((p) => p.value).join(' '); }
          });
          // Rebuild all-tables data
          window._allTablesData = build_all_tables();
          updateTabCounts();
          Toastify({ text: 'Enregistré !', duration: 2500, style: { background: '#1F6D67' } }).showToast();
          closeEditModal();
        } catch (err) {
          Toastify({ text: `Erreur : ${err.message}`, duration: 4000, style: { background: '#dc2626' } }).showToast();
          saveBtn.disabled = false;
          saveBtn.textContent = 'Sauvegarder';
        }
      });

      /* ── CREATE RECORD ── */
      let createCtx = null; // { table }

      async function createRecord(table, fields) {
        const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}`;
        const res = await fetch(url, {
          method: 'POST',
          headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
        return data;
      }

      function openCreateModal(tableName) {
        createCtx = { table: tableName };
        document.getElementById('create-table-name').textContent = tableName;

        const records = db[tableName] || [];
        const fieldKeys = new Set();
        records.forEach((r) => {
          Object.keys(r.fields).forEach((k) => {
            if (!k.startsWith('_')) fieldKeys.add(k);
          });
        });
        const sortedKeys = Array.from(fieldKeys).sort();

        const container = document.getElementById('create-form-fields');
        container.innerHTML = sortedKeys.map((key) => {
          return `<div class="create-field-group">
            <label for="cf-${esc(key)}">${esc(key)}</label>
            <textarea id="cf-${esc(key)}" rows="2" placeholder="${esc(key)}"></textarea>
          </div>`;
        }).join('');

        document.getElementById('create-save-btn').disabled = false;
        document.getElementById('create-save-btn').textContent = 'Créer';
        document.getElementById('create-modal').classList.add('open');
      }

      function closeCreateModal() {
        document.getElementById('create-modal').classList.remove('open');
        createCtx = null;
      }

      document.getElementById('create-btn').addEventListener('click', () => {
        if (currentTab && currentTab !== 'all' && currentTab !== 'alltables') {
          openCreateModal(currentTab);
        }
      });

      document.getElementById('create-close-btn').addEventListener('click', closeCreateModal);
      document.getElementById('create-cancel-btn').addEventListener('click', closeCreateModal);
      document.getElementById('create-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeCreateModal();
      });

      /* ── PHOTO EDITOR EVENTS ── */
      // Listen for photo-edit-btn clicks (delegated)
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('.photo-edit-btn');
        if (!btn) return;
        e.stopPropagation();
        openPhotoEditor(btn.dataset.table, btn.dataset.recid, btn.dataset.field);
      });

      document.getElementById('photo-close-btn').addEventListener('click', closePhotoEditor);
      document.getElementById('photo-cancel-btn').addEventListener('click', closePhotoEditor);
      document.getElementById('photo-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closePhotoEditor();
      });

      document.getElementById('photo-add-url-btn').addEventListener('click', () => {
        const input = document.getElementById('photo-url-input');
        addPhotoUrl(input.value);
        input.focus();
      });

      document.getElementById('photo-url-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const input = e.target;
          addPhotoUrl(input.value);
          input.focus();
        }
      });

      document.getElementById('photo-file-input').addEventListener('change', (e) => {
        uploadFiles(e.target.files);
        e.target.value = ''; // Allow re-selecting same files
      });

      document.getElementById('photo-save-btn').addEventListener('click', savePhotoChanges);

      document.getElementById('create-save-btn').addEventListener('click', async () => {
        if (!createCtx) return;
        const saveBtn = document.getElementById('create-save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Création…';

        // Collect all field values
        const container = document.getElementById('create-form-fields');
        const inputs = container.querySelectorAll('textarea');
        const fields = {};
        inputs.forEach((input) => {
          const val = input.value.trim();
          if (val) {
            const fieldName = input.id.replace(/^cf-/, '');
            fields[fieldName] = val;
          }
        });

        try {
          const result = await createRecord(createCtx.table, fields);
          // Add to local db
          if (!db[createCtx.table]) db[createCtx.table] = [];
          db[createCtx.table].push(result);
          recordIdToTable[result.id] = createCtx.table;
          // Rebuild Tout data if needed
          if (createCtx.table === TABLE_MAISON || createCtx.table === TABLE_LIVRET ||
              createCtx.table === TABLE_EQUIPEMENT || createCtx.table === TABLE_PISCINE ||
              createCtx.table === TABLE_LISTE_MAISON) {
            const { rows, houses } = buildData();
            allRows = rows;
          }
          // Rebuild all-tables data & refresh
          window._allTablesData = build_all_tables();
          updateTabCounts();
          applyFilter();
          Toastify({ text: 'Créé avec succès !', duration: 2500, style: { background: '#1F6D67' } }).showToast();
          closeCreateModal();
        } catch (err) {
          Toastify({ text: `Erreur : ${err.message}`, duration: 4000, style: { background: '#dc2626' } }).showToast();
          saveBtn.disabled = false;
          saveBtn.textContent = 'Créer';
        }
      });




      /* ── PHOTO EDITOR ── */
      function resetPhotoEditorState() {
        photoExisting = [];
        photoNewUrls = [];
        photoPendingFiles = [];
        document.getElementById('photo-url-input').value = '';
        document.getElementById('photo-file-input').value = '';
        document.getElementById('photo-pending-preview').innerHTML = '';
        document.getElementById('upload-progress').classList.remove('active');
      }

      function openPhotoEditor(table, recId, field) {
        if (!field) {
          Toastify({ text: 'Champ photo non identifié pour ce champ', duration: 3000, style: { background: '#dc2626' } }).showToast();
          return;
        }
        photoCtx = { table, recId, field };
        resetPhotoEditorState();

        // Find current attachments
        const records = db[table] || [];
        const rec = records.find((r) => r.id === recId);
        const attachments = rec?.fields?.[field] || [];
        photoExisting = (attachments || [])
          .filter((a) => !/\.(mp4|webm|ogg|mov|m4v|avi)$/i.test(a.filename || ''))
          .map((a) => ({ id: a.id, url: a.url, filename: a.filename || 'photo' }));
        photoOriginalCount = photoExisting.length;

        document.getElementById('photo-field-name').textContent = field;
        document.getElementById('photo-meta').textContent = `${table}  ·  ${recId}`;

        renderPhotoGrid();
        updatePhotoSaveButton();
        document.getElementById('photo-modal').classList.add('open');
      }

      function closePhotoEditor() {
        document.getElementById('photo-modal').classList.remove('open');
        photoCtx = null;
        resetPhotoEditorState();
      }

      function renderPhotoGrid() {
        const grid = document.getElementById('photo-grid');
        const empty = document.getElementById('photo-empty-state');
        const hasExisting = photoExisting.length > 0;

        grid.innerHTML = photoExisting.map((p) => `
          <div class="photo-grid-item">
            <img src="${esc(p.url)}" alt="${esc(p.filename)}" />
            <button class="photo-delete-btn" data-photo-id="${esc(p.id)}" title="Supprimer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        `).join('');

        empty.style.display = hasExisting ? 'none' : 'block';
        grid.style.display = hasExisting ? 'grid' : 'none';

        // Wire delete buttons
        grid.querySelectorAll('.photo-delete-btn').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.photoId;
            photoExisting = photoExisting.filter((p) => p.id !== id);
            renderPhotoGrid();
            updatePhotoSaveButton();
          });
        });
      }

      function updatePhotoSaveButton() {
        const btn = document.getElementById('photo-save-btn');
        const hasChanges = photoPendingFiles.length > 0 || photoNewUrls.length > 0 ||
          photoExisting.length !== photoOriginalCount;
        btn.disabled = !hasChanges;
      }

      function addPhotoUrl(url) {
        if (!url || !url.trim()) return false;
        const trimmed = url.trim();
        // Extract filename from URL
        const filename = trimmed.split('/').pop().split('?')[0] || 'photo.jpg';
        photoNewUrls.push({ url: trimmed, filename });
        document.getElementById('photo-url-input').value = '';
        updatePhotoSaveButton();
        Toastify({ text: 'Photo ajoutée !', duration: 2000, style: { background: '#1F6D67' } }).showToast();
        return true;
      }

      function uploadFiles(files) {
        if (!files || files.length === 0) return;

        const progress = document.getElementById('upload-progress');
        const status = document.getElementById('upload-status');
        progress.classList.add('active');

        Array.from(files).forEach((file) => {
          if (!file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            const dataUrl = e.target.result;
            const filename = file.name;
            photoPendingFiles.push({ file, dataUrl, filename });
            renderPendingPreviews();
            updatePhotoSaveButton();
            progress.classList.remove('active');
          };
          reader.readAsDataURL(file);
        });
      }

      function renderPendingPreviews() {
        const container = document.getElementById('photo-pending-preview');
        container.innerHTML = photoPendingFiles.map((p, i) => `
          <div class="photo-pending-item">
            <img src="${esc(p.dataUrl)}" alt="${esc(p.filename)}" />
            <button class="remove-pending" data-index="${i}">✕</button>
          </div>
        `).join('');

        container.querySelectorAll('.remove-pending').forEach((btn) => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.index);
            photoPendingFiles.splice(idx, 1);
            renderPendingPreviews();
            updatePhotoSaveButton();
          });
        });
      }

      async function uploadPendingFileToHosting(file, filename) {
        // Try to upload via imgbb API if a key is configured
        if (IMGBB_API_KEY) {
          try {
            const formData = new FormData();
            formData.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
              method: 'POST',
              body: formData,
            });
            const data = await res.json();
            if (data.success) {
              return { url: data.data.url, filename };
            }
          } catch (e) {
            // Fall through to alternative
          }
        }

        // Fallback: return null (user will need to paste URL manually)
        return null;
      }

      async function savePhotoChanges() {
        if (!photoCtx) return;
        const saveBtn = document.getElementById('photo-save-btn');
        saveBtn.disabled = true;
        saveBtn.textContent = 'Sauvegarde…';

        const status = document.getElementById('upload-status');
        const progress = document.getElementById('upload-progress');

        try {
          // Upload pending files first
          const uploadedUrls = [];
          for (const p of photoPendingFiles) {
            status.textContent = `Upload de ${p.filename}…`;
            progress.classList.add('active');
            const uploaded = await uploadPendingFileToHosting(p.file, p.filename);
            progress.classList.remove('active');
            if (uploaded) {
              uploadedUrls.push(uploaded);
            } else {
              // Ask user to paste URL
              const url = prompt(`Impossible d'uploader ${p.filename}. Collez l'URL de l'image (ou annulez pour ignorer) :`);
              if (url && url.trim()) {
                uploadedUrls.push({ url: url.trim(), filename: p.filename });
              }
            }
          }

          // Build final attachments array
          const finalAttachments = [
            ...photoExisting.map((p) => ({ id: p.id })),
            ...photoNewUrls.map((p) => ({ url: p.url, filename: p.filename })),
            ...uploadedUrls.map((p) => ({ url: p.url, filename: p.filename })),
          ];

          // Save to Airtable
          const url = `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(photoCtx.table)}/${photoCtx.recId}`;
          const res = await fetch(url, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { [photoCtx.field]: finalAttachments } }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));

          // Update local db
          const records = db[photoCtx.table];
          const rec = records?.find((r) => r.id === photoCtx.recId);
          if (rec) {
            rec.fields[photoCtx.field] = data.fields[photoCtx.field];
          }

          // Rebuild Tout data if needed
          if (photoCtx.table === TABLE_MAISON || photoCtx.table === TABLE_LIVRET ||
              photoCtx.table === TABLE_EQUIPEMENT || photoCtx.table === TABLE_PISCINE ||
              photoCtx.table === TABLE_LISTE_MAISON) {
            const rebuilt = buildData();
            allRows = rebuilt.rows;
          }

          // Refresh view
          applyFilter();

          saveBtn.textContent = 'Sauvegarder les photos';
          Toastify({ text: 'Photos enregistrées !', duration: 2500, style: { background: '#1F6D67' } }).showToast();
          closePhotoEditor();
        } catch (err) {
          Toastify({ text: `Erreur : ${err.message}`, duration: 4000, style: { background: '#dc2626' } }).showToast();
          saveBtn.disabled = false;
          saveBtn.textContent = 'Sauvegarder les photos';
        }
      }

      /* ── init ── */
      (async function init() {
        try {
          const [
            maisonRecs, livretRecs, equipRecs, piscineRecs, listRecs,
            dispositionRecs, workflowRecs, conditionRecs, proprioRecs, recommandRecs,
          ] = await Promise.all([
            fetchAll(TABLE_MAISON),
            fetchAll(TABLE_LIVRET),
            fetchAll(TABLE_EQUIPEMENT),
            fetchAll(TABLE_PISCINE),
            fetchAll(TABLE_LISTE_MAISON),
            fetchAll(TABLE_DISPOSITION),
            fetchAll(TABLE_WORKFLOW),
            fetchAll(TABLE_CONDITION),
            fetchAll(TABLE_PROPRIETAIRE),
            fetchAll(TABLE_RECOMMANDATION),
          ]);

          db[TABLE_MAISON] = maisonRecs;
          db[TABLE_LIVRET] = livretRecs;
          db[TABLE_EQUIPEMENT] = equipRecs;
          db[TABLE_PISCINE] = piscineRecs;
          db[TABLE_LISTE_MAISON] = listRecs;
          db[TABLE_DISPOSITION] = dispositionRecs;
          db[TABLE_WORKFLOW] = workflowRecs;
          db[TABLE_CONDITION] = conditionRecs;
          db[TABLE_PROPRIETAIRE] = proprioRecs;
          db[TABLE_RECOMMANDATION] = recommandRecs;

          // Populate houseNameToId from ListeMaison (must be before build_all_tables)
          listRecs.forEach((r) => {
            const name = r.fields.NomMaison || r.fields.Name || '';
            const id = r.fields.IdMaison || '';
            if (name && id) {
              houseNameToId[name] = id;
              idToHouseName[id] = name;
              recIdToHouseName[r.id] = name;
            }
          });

          // Store all-tables data
          window._allTablesData = build_all_tables();

          // Build reverse index: recId → tableName
          const allTables = [TABLE_MAISON, TABLE_LIVRET, TABLE_EQUIPEMENT, TABLE_PISCINE,
            TABLE_LISTE_MAISON, TABLE_DISPOSITION, TABLE_WORKFLOW, TABLE_CONDITION,
            TABLE_PROPRIETAIRE, TABLE_RECOMMANDATION];
          allTables.forEach((t) => {
            (db[t] || []).forEach((rec) => { recordIdToTable[rec.id] = t; });
          });

          // Build Tout data
          const { rows, houses } = buildData();
          all_houses = houses;
          allRows = rows;

          // Populate house filter
          const sel = document.getElementById('house-filter');
          houses.forEach((h) => {
            const opt = document.createElement('option');
            opt.value = h;
            opt.textContent = h;
            sel.appendChild(opt);
          });

          // Category chips
          const cats = [...new Set(rows.map((r) => r.categorie).filter(Boolean))].sort();
          const catDiv = document.getElementById('cat-filter');
          ['Tout', ...cats].forEach((cat) => {
            const btn = document.createElement('button');
            btn.className = 'cat-chip' + (cat === 'Tout' ? ' active' : '');
            btn.textContent = cat;
            btn.addEventListener('click', () => {
              document.querySelectorAll('.cat-chip').forEach((c) => c.classList.remove('active'));
              btn.classList.add('active');
              selectedCat = cat === 'Tout' ? '' : cat;
              applyFilter();
            });
            catDiv.appendChild(btn);
          });

          // Update tab counts
          updateTabCounts();

          // Render initial Tout view
          renderToutRows(rows);
        } catch (err) {
          console.error(err);
          document.getElementById('tbody').innerHTML = `<tr><td colspan="5"><div class="state-box">Erreur : ${esc(err.message)}</div></td></tr>`;
        }
      })();
    </script>
  </body>
