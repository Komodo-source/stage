const BASE_ID = 'appLWhCKR6pEGE02s';
  async function fetchAll(table) {
    let records = [], offset = null;
    do {
      const url = new URL(`https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(table)}`);
      if (offset) url.searchParams.set('offset', offset);
      const res  = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
      const data = await res.json();
      console.log(table, data)
      if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));
      records = records.concat(data.records);
      offset  = data.offset || null;
    } while (offset);
    return records;
  }

function copy(v) {
  navigator.clipboard.writeText(v).then(() => alert('Id copié !')).catch(() => prompt('Copier Id :', v));
}

async function buildLivret() {
  const [ maisonRecs] =
    await Promise.all([
      fetchAll("ListeMaison")
    ]);
    let elt = "<div id='houses'>";
      document.getElementById("main-text").innerText = "";
      elt+= `<h2>Nombre de Maison dans Airtable: ${maisonRecs.length}</h2>`
      elt += "<div class='separator'></div>";
    maisonRecs.forEach(element => {

      console.log(element)
      elt += "<p>ID: " + element.fields.IdMaison + "</p>";
      elt += "<p>" + element.fields.NomMaison + "</p>";

      elt += `<button onclick="window.open('https://komodo-source.github.io/stage/livret_idylliq.html?maison=${element.fields.IdMaison}', '_blank')" target="_blank">aller vers le livret</button>`;
      elt += `<button onclick="copy('${element.fields.IdMaison}')">copier le nom de la maison</button>`;
      elt += "<div class='separator'></div>";
    });
    let main = document.getElementById("main");
    main.innerHTML = elt;
}

  buildLivret().catch(err => {
    console.error(err);
    document.getElementById('loading').innerText = 'Erreur : ' + err.message;
  });
